index_id: example_database_model_templates
database_id: example_database
schema_version: "1.0"
physicsguard_version: "0.8.1"
model_library_indexes: []
templates:
  - template_id: example_template
    template_name: Example reusable low-fidelity model template
    template_path: path/to/model_template.yaml
    model_library_entry_id: null
    source_project_id: example_project
    evidence_registry: path/to/project/evidence/project_evidence_registry.yaml
    validation_reports: []
    compatible_tags:
      - example-domain
    known_limits:
      - Template is not validated for a new project until project-specific data are checked.
    safe_claim_boundary: >
      Template is a starting point only; project-specific validation is still
      required.
    review_state: review_required
    metadata: {}
metadata: {}
