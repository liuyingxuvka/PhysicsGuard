catalog_id: example_database_catalog
catalog_name: Example PhysicsGuard database catalog
schema_version: "1.0"
physicsguard_version: "0.8.1"
created_at: "2026-06-11T00:00:00Z"
updated_at: "2026-06-11T00:00:00Z"
description: >
  Lightweight cross-project map. Keep raw test data in source files and store
  only references, summaries, tags, confidence state, and gap state here.
catalog_roots:
  - examples
lifecycle_artifacts:
  database_readme: DATABASE_README.md
  database_status: DATABASE_STATUS.md
  database_policy: database_policy.yaml
  database_catalog: database_catalog.yaml
  database_history: database_history.jsonl
  database_maintenance_report: database_maintenance_report.yaml
  model_template_index: model_template_index.yaml
database_policy: database_policy.yaml
database_history: database_history.jsonl
database_maintenance_report: database_maintenance_report.yaml
model_template_index: model_template_index.yaml
projects:
  - project_id: example_project
    project_name: Example project
    project_evidence_registry: path/to/project_evidence_registry.yaml
    project_status: active
    lifecycle_state: active_registered
    admission:
      requested_state: active_registered
      project_root: path/to/project
      project_adoption_record: path/to/project/.physicsguard/project.yaml
      project_evidence_registry: path/to/project_evidence_registry.yaml
      evidence_gap_status: unknown
      admitted_at: "2026-06-11T00:00:00Z"
      admitted_by: PhysicsGuard AI
      admission_reason: example active registration
      review_state: ai_registered
    domain_tags:
      - example-domain
    system_tags:
      - example-system
    subsystem_tags: []
    component_tags:
      - example-component
    test_object_tags:
      - example-test-object
    testbench_tags:
      - example-testbench
    measurement_tags:
      - example-measurement
    run_period_summary: example run period
    location_summary: example location or unknown reason
    has_test_data: true
    has_model: true
    has_validation: false
    has_model_library_entry: false
    confidence_summary:
      source_state: unknown
      mapping_state: unknown
      data_quality_state: unknown
      validation_state: unknown
      reuse_state: unknown
      catalog_freshness: current
      review_state: ai_registered
    last_scanned_at: "2026-06-11T00:00:00Z"
model_library_indexes: []
tag_dictionary:
  aliases: {}
  descriptions: {}
policies:
  require_project_registry_for_cross_project_claims: true
  require_gap_check_before_query_claims: true
  require_explicit_scope_before_comparison: true
  forbid_raw_data_payloads: true
metadata: {}
