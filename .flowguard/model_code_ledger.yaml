ledger_version: 1
project: PhysicsGuard
updated_for_version: 0.4.0
evidence_level: navigation
purpose: >
  Current ownership map from FlowGuard model responsibilities to PhysicsGuard
  source symbols, tests, examples, boundaries, and validation commands. This
  ledger helps future AI agents find the right implementation surface; it does
  not prove runtime behavior or physical correctness by itself.
entries:
  - id: core.system_validation
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - ValidateSystem
    responsibility: >
      Validate user-supplied system, hierarchy, observation, and assumption
      inputs before registry construction, residual assembly, or solving.
    code_symbols:
      - src/physicsguard/schema/system_spec.py::SystemSpec
      - src/physicsguard/schema/hierarchy_spec.py::HierarchicalAuditSpec
      - src/physicsguard/schema/observation_spec.py::ObservedValuesSpec
      - src/physicsguard/schema/observation_spec.py::ObservedValueSpec
      - src/physicsguard/schema/assumption_spec.py::AssumptionSpec
      - src/physicsguard/io/yaml_loader.py::load_system_spec
      - src/physicsguard/io/hierarchy_loader.py::load_hierarchical_audit_spec
      - src/physicsguard/io/observation_loader.py::load_observed_values
    tests:
      - tests/test_system_spec.py
      - tests/test_yaml_loader.py
      - tests/test_hierarchy_spec.py
      - tests/test_observation_spec.py
      - tests/test_signal_mapping_ledger.py
      - tests/test_assumption_spec.py
    examples:
      - examples/dummy_system.yaml
      - examples/hierarchical/fuel_cell_system/level_0_system_balance.yaml
      - examples/hierarchical/observed_debugging/pitch_feedback_observed_clean.yaml
      - examples/assumptions/variable_assumption.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: FlowGuard validation branch coverage for schema and setup failures.
      - command: python -m pytest tests/test_system_spec.py tests/test_yaml_loader.py tests/test_hierarchy_spec.py tests/test_observation_spec.py tests/test_assumption_spec.py
        covers: Input schema and loader behavior.
    boundaries:
      - Invalid schema or malformed input must stop before solving.
      - Diagnostics must remain JSON-serializable and AI-consumable.
      - Observed values are assumed SI unless explicit conversion exists.
      - Signal mapping fields record evidence and review state only; they must not mutate observed values.
    stale_when:
      - A schema class, loader, or required validation branch is renamed, moved, or removed.
      - New top-level input modes are added without validation ownership.

  - id: core.registry_and_assumptions
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - BuildRegistry
    responsibility: >
      Build module and variable registries, apply explicit parameter assumptions,
      reject assumptions as free variables, and preserve module-agnostic registry
      construction.
    code_symbols:
      - src/physicsguard/core/residual.py::ResidualBuilder
      - src/physicsguard/core/registry.py::VariableRegistry
      - src/physicsguard/core/assumptions.py::AssumptionManager
      - src/physicsguard/modules/registry.py::ModuleRegistry
      - src/physicsguard/modules/registry.py::default_module_registry
    tests:
      - tests/test_residual_builder.py
      - tests/test_variable_registry.py
      - tests/test_assumption_manager.py
      - tests/test_assumption_residuals.py
    examples:
      - examples/generic_audit_system.yaml
      - examples/assumptions/parameter_assumption.yaml
      - examples/assumptions/proposed_assumption.yaml
      - examples/assumptions/rejected_assumption.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: Registry, assumption, and setup failure branches.
      - command: python -m pytest tests/test_residual_builder.py tests/test_variable_registry.py tests/test_assumption_manager.py tests/test_assumption_residuals.py
        covers: Registry construction, variable constraints, and explicit assumption behavior.
    boundaries:
      - All solver variables must have finite bounds, finite initial guesses, and positive finite scales.
      - Proposed and rejected assumptions must be reported but not applied.
      - Active parameter assumptions may fill or explicitly override parameters only under documented rules.
    stale_when:
      - Module registration moves away from ModuleRegistry.
      - Assumption application order or free-variable behavior changes.

  - id: core.residual_assembly
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - AssembleResiduals
    responsibility: >
      Assemble normalized residual records, select solver-participating residuals,
      keep diagnostic-only post checks visible, and reject invalid residual vectors.
    code_symbols:
      - src/physicsguard/core/residual.py::ResidualBuilder
      - src/physicsguard/core/residual.py::ResidualRecord
      - src/physicsguard/core/registry.py::VariableRegistry
    tests:
      - tests/test_residual_builder.py
      - tests/test_solver.py
      - tests/test_diagnostics.py
    examples:
      - examples/generic_audit_system.yaml
      - examples/generic_conflict_system.yaml
      - examples/physical_conflict.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: Residual normalization, post_check selection, and setup failure branches.
      - command: python -m pytest tests/test_residual_builder.py tests/test_solver.py tests/test_diagnostics.py
        covers: Residual vector construction, solver participation, and diagnostics ranking.
    boundaries:
      - Residuals must be normalized before solving.
      - post_check residuals remain diagnostic unless explicitly allowed as soft checks.
      - Solver selection must not silently include invalid diagnostic-only checks.
    stale_when:
      - Residual roles, residual normalization, or solver vector selection semantics change.
      - ResidualRecord fields are renamed or moved.

  - id: core.solve_evaluate_compare
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - ExecuteMode
    responsibility: >
      Execute solve, observed-value evaluation, and reference comparison while
      keeping optimizer convergence separate from audit plausibility and keeping
      observed values non-mutating.
    code_symbols:
      - src/physicsguard/core/solver.py::BoundedSolver
      - src/physicsguard/core/solver.py::SolverResult
      - src/physicsguard/core/evaluator.py::AuditEvaluator
      - src/physicsguard/core/evaluator.py::ObservedEvaluationResult
      - src/physicsguard/core/evaluator.py::ComparisonResult
      - src/physicsguard/cli.py::solve
      - src/physicsguard/cli.py::evaluate
      - src/physicsguard/cli.py::compare
    tests:
      - tests/test_solver.py
      - tests/test_evaluator.py
      - tests/test_cli.py
    examples:
      - examples/physical_coolant_heat_balance.yaml
      - examples/observed/physical_coolant_observed_clean.yaml
      - examples/observed/physical_coolant_observed_conflict.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: Solve, evaluate, compare, non-convergence, and audit-fail branches.
      - command: python -m pytest tests/test_solver.py tests/test_evaluator.py tests/test_cli.py
        covers: Solver results, observed evaluation, reference comparison, and CLI behavior.
    boundaries:
      - optimization_success is numerical optimizer convergence.
      - audit_pass is residual-threshold plausibility.
      - Observed evaluate mode substitutes external values directly and must not solve or move them.
    stale_when:
      - CLI mode routing changes.
      - SolverResult, ObservedEvaluationResult, or ComparisonResult semantics change.

  - id: core.hierarchy_modes
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - ExecuteMode
      - GenerateDiagnostics
    responsibility: >
      Execute and report hierarchy run, plan, inspect, evaluate, and compare
      modes without auto-refinement and without moving observed external values.
    code_symbols:
      - src/physicsguard/core/hierarchy.py::HierarchicalAuditRunner
      - src/physicsguard/core/hierarchy.py::BlockIndex
      - src/physicsguard/core/hierarchy.py::RecommendedRefinement
      - src/physicsguard/core/signal_mapping.py::SignalMappingRecord
      - src/physicsguard/core/signal_mapping.py::BugFamilyFollowUp
      - src/physicsguard/core/signal_mapping.py::build_signal_mapping_ledger
      - src/physicsguard/core/signal_mapping.py::derive_bug_family_followups
      - src/physicsguard/cli.py::hierarchy_run
      - src/physicsguard/cli.py::hierarchy_inspect
      - src/physicsguard/cli.py::hierarchy_plan
      - src/physicsguard/cli.py::hierarchy_evaluate
      - src/physicsguard/cli.py::hierarchy_compare
    tests:
      - tests/test_hierarchy_runner.py
      - tests/test_hierarchy_cli.py
      - tests/test_hierarchy_block_index.py
      - tests/test_hierarchy_refinement.py
      - tests/test_hierarchy_scoring.py
      - tests/test_signal_mapping_ledger.py
    examples:
      - examples/hierarchical/fuel_cell_system/level_0_system_balance.yaml
      - examples/hierarchical/fuel_cell_system/conflict_level_0_h2_power.yaml
      - examples/hierarchical/observed_debugging/pitch_feedback_level_0.yaml
      - examples/hierarchical/observed_debugging/pitch_feedback_observed_fault.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: Hierarchy run, plan, inspect, evaluate, compare, and diagnostics labels.
      - command: python -m pytest tests/test_hierarchy_runner.py tests/test_hierarchy_cli.py tests/test_hierarchy_block_index.py tests/test_hierarchy_refinement.py tests/test_hierarchy_scoring.py
        covers: Hierarchy execution, block ownership, scoring, refinement recommendations, and CLI behavior.
    boundaries:
      - hierarchy inspect validates structure without solving.
      - hierarchy evaluate substitutes observed values without solving.
      - hierarchy compare solves a low-fidelity reference and then evaluates observed values.
      - Signal mapping ledger and bug-family follow-ups are evidence-routing outputs; they do not convert values or auto-repair models.
      - Refinement rules recommend next templates but do not execute them automatically.
    stale_when:
      - A hierarchy mode is added, renamed, or changes solve/no-solve behavior.
      - Block scoring, refinement, or observed hierarchy semantics change.
      - Signal mapping ledger or bug-family follow-up output changes.

  - id: core.diagnostics_reporting
    model_file: .flowguard/physicsguard_core_model.py
    model_blocks:
      - GenerateDiagnostics
    responsibility: >
      Emit JSON-ready diagnostics only from valid solver, observed, comparison,
      hierarchy, inspection, or setup-failure sources, including visible
      assumptions and residual roles.
    code_symbols:
      - src/physicsguard/core/diagnostics.py::DiagnosticReporter
      - src/physicsguard/core/diagnostics.py::DiagnosticReport
      - src/physicsguard/core/diagnostics.py::ResidualDiagnostic
      - src/physicsguard/core/assumptions.py::AssumptionSummary
      - src/physicsguard/cli.py::main
    tests:
      - tests/test_diagnostics.py
      - tests/test_assumption_diagnostics.py
      - tests/test_assumption_cli.py
      - tests/test_cli.py
    examples:
      - examples/dummy_system.yaml
      - examples/generic_conflict_system.yaml
      - examples/assumptions/variable_assumption.yaml
    validation_commands:
      - command: python .flowguard/run_physicsguard_core_checks.py
        covers: Diagnostics source ordering and assumption-reporting invariants.
      - command: python -m pytest tests/test_diagnostics.py tests/test_assumption_diagnostics.py tests/test_assumption_cli.py tests/test_cli.py
        covers: JSON diagnostics, warnings, assumption cards, and CLI output.
    boundaries:
      - Diagnostics must be JSON-serializable and suitable for AI consumption.
      - Diagnostics must not imply audit pass just because the optimizer converged.
      - Assumption cards must remain visible in diagnostic output.
    stale_when:
      - Diagnostic report fields, CLI output shape, or assumption-reporting semantics change.
      - New execution modes emit diagnostics without being represented in the FlowGuard model.

  - id: workflow.project_adoption
    model_file: .flowguard/physicsguard_ai_workflow_model.py
    model_blocks:
      - AdoptProject
    responsibility: >
      Identify the active PhysicsGuard repository, package version, workflow
      schema, local skill routes, adoption log, and project policy before
      non-trivial AI debugging or localization claims.
    code_symbols:
      - src/physicsguard/workflow.py::project_record_payload
      - src/physicsguard/workflow.py::adopt_project
      - src/physicsguard/workflow.py::audit_project
      - src/physicsguard/cli.py::project_command
    tests:
      - tests/test_workflow_governance.py
    examples:
      - .physicsguard/module_equation_ledger.yaml
      - docs/physicsguard_adoption_log.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_ai_workflow_checks.py
        covers: Project-adoption gate before downstream AI workflow claims.
      - command: python -m physicsguard.cli project audit --pretty
        covers: Current repository adoption record.
      - command: python -m pytest tests/test_workflow_governance.py
        covers: Adopted, missing, and CLI project-record behavior.
    boundaries:
      - Project adoption is workflow evidence, not runtime physical-audit proof.
      - Version mismatch warnings must not be treated as passed runtime evidence.
      - The project record must point to the main skill and adoption log.
    stale_when:
      - Project record fields, policy keys, skill routes, or version semantics change.
      - The repository moves or package metadata changes without refreshing adoption evidence.

  - id: workflow.preflight_and_intake
    model_file: .flowguard/physicsguard_ai_workflow_model.py
    model_blocks:
      - ReviewPreflight
      - ReviewIntake
    responsibility: >
      Review the model-understanding preflight and external-model intake so AI
      agents record visible symptoms, boundaries, units, assumptions, source
      model context, signal mappings, confidence, conversion evidence, stale
      conditions, and required reviews before fault claims.
    code_symbols:
      - src/physicsguard/workflow.py::review_model_understanding_preflight
      - src/physicsguard/workflow.py::review_external_model_intake
      - src/physicsguard/cli.py::preflight_review
      - src/physicsguard/cli.py::intake_review
    tests:
      - tests/test_workflow_governance.py
    examples:
      - templates/model_understanding_preflight.yaml
      - templates/external_model_intake.yaml
      - docs/model_understanding_preflight.md
      - docs/external_model_intake.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_ai_workflow_checks.py
        covers: Preflight and intake gates before localization claims.
      - command: python -m physicsguard.cli preflight review templates/model_understanding_preflight.yaml --pretty
        covers: Current model-understanding template.
      - command: python -m physicsguard.cli intake review templates/external_model_intake.yaml --pretty
        covers: Current external-model intake template.
      - command: python -m pytest tests/test_workflow_governance.py
        covers: Review pass/fail and CLI JSON output.
    boundaries:
      - Preflight and intake records are AI workflow governance; they do not prove external-model truth.
      - Uncertain mappings must remain explicit until reviewed.
      - Intake metadata must not mutate observed values or silently apply conversions.
    stale_when:
      - Preflight or intake required fields change.
      - Signal mapping confidence, conversion, or stale-evidence semantics change.

  - id: workflow.module_equation_ledger
    model_file: .flowguard/physicsguard_ai_workflow_model.py
    model_blocks:
      - CheckModuleLedger
    responsibility: >
      Keep a machine-checkable navigation map from representative PhysicsGuard
      module families to low-fidelity equation summaries, SI-unit expectations,
      assumptions, diagnostic keys, tests, examples, and stale-evidence triggers.
    code_symbols:
      - scripts/check_module_equation_ledger.py::validate_ledger
    tests:
      - tests/test_module_equation_ledger.py
    examples:
      - .physicsguard/module_equation_ledger.yaml
      - docs/module_equation_ledger.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_ai_workflow_checks.py
        covers: Ledger freshness gate before AI workflow done claims.
      - command: python scripts/check_module_equation_ledger.py --json
        covers: Ledger fields, registered module types, tests, and examples.
      - command: python -m pytest tests/test_module_equation_ledger.py
        covers: Valid, missing-field, and unregistered-module cases.
    boundaries:
      - The ledger is navigation evidence, not physical correctness proof.
      - Ledger entries are representative module-family coverage, not exhaustive model verification.
      - Runtime claims still require PhysicsGuard reports, FlowGuard checks, tests, examples, and closure evidence.
    stale_when:
      - Module type names, diagnostic keys, examples, test files, or documented equations change.
      - A new module family is added without an owning ledger row.

  - id: workflow.skill_sync_and_closure
    model_file: .flowguard/physicsguard_ai_workflow_model.py
    model_blocks:
      - SyncSkills
      - ReviewClosure
    responsibility: >
      Keep repository skill prompts and locally installed Codex skills aligned,
      then gate final PhysicsGuard localization claims on audit, mapping,
      refinement, bug-family, stale-evidence, and skipped-check closure signals.
    code_symbols:
      - skill/physicsguard-ai-debugging/scripts/physicsguard_closure_check.py::check
      - skill/physicsguard-ai-debugging/scripts/physicsguard_closure_check.py::main
    tests:
      - tests/test_physicsguard_closure_helper.py
    examples:
      - skill/physicsguard-ai-debugging/SKILL.md
      - skill/physicsguard-project-adoption/SKILL.md
      - skill/physicsguard-model-understanding-preflight/SKILL.md
      - skill/physicsguard-signal-mapping-review/SKILL.md
      - skill/physicsguard-audit-closure/SKILL.md
      - skill/physicsguard-candidate-model-blueprint/SKILL.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_ai_workflow_checks.py
        covers: Skill-sync and closure gates before done claims.
      - command: python -m pytest tests/test_physicsguard_closure_helper.py
        covers: Mapping review issue codes and skipped-check closure downgrade behavior.
      - command: powershell installed skill file comparisons
        covers: Local installed skill copies match repository skill sources.
    boundaries:
      - Closure helper output can be passed, partial, downgraded, blocked, or stale; only passed supports broad completion language.
      - Skill sync does not replace runtime audit reports or tests.
      - Closure findings must not imply commercial-model equivalence or high-fidelity proof.
    stale_when:
      - Skill prompts, subskill routes, closure statuses, or closure finding categories change.
      - Installed skill copies differ from repository skill source after workflow changes.

  - id: workflow.test_file_contract_route
    model_file: .flowguard/physicsguard_test_file_contract_model.py
    model_blocks:
      - SelectTestFileRoute
      - GenerateDataFileManifest
      - VerifyManifestFreshness
      - ResolveTestbenchProfile
      - ResolveModelBinding
      - BuildParameterCatalog
      - ApplyRoleMatrix
      - ResolveMappingEdges
      - EnforceCoverageContract
      - GateAnalysisClaim
    responsibility: >
      Govern the optional testbench/test-data file route so model-only
      PhysicsGuard work is not burdened, while concrete test files require a
      generated manifest, fresh extractor evidence, testbench profile, model
      binding, complete catalog, role matrix, evidence-backed mappings, known
      model targets, and a passing contract check before broad AI analysis
      claims.
    code_symbols:
      - src/physicsguard/schema/data_file_manifest.py::DataFileManifestSpec
      - src/physicsguard/schema/test_file_contract.py::TestFileContractSpec
      - src/physicsguard/schema/test_file_contract.py::ModelBindingSpec
      - src/physicsguard/schema/parameter_coverage.py::MappingEvidenceSpec
      - src/physicsguard/core/data_file_manifest.py::generate_delimited_manifest
      - src/physicsguard/core/data_file_manifest.py::field_signature_hash
      - src/physicsguard/core/parameter_coverage.py::check_parameter_coverage
      - src/physicsguard/core/test_file_contract.py::check_test_file_contract
      - src/physicsguard/core/test_file_contract.py::check_test_file_parameter_coverage
      - src/physicsguard/core/test_file_contract.py::check_test_file_project_index
      - src/physicsguard/core/contract_diff.py::diff_test_file_contracts
      - src/physicsguard/cli.py::testfile_contract_check_command
      - src/physicsguard/cli.py::coverage_check_command
    tests:
      - tests/test_test_file_contract_schema.py
      - tests/test_test_file_contract_core.py
      - tests/test_test_file_contract_cli.py
    examples:
      - examples/testfile_contracts/pump_loop/contracts/clean_contract.yaml
      - examples/testfile_contracts/pump_loop/data/clean_manifest.yaml
      - examples/testfile_contracts/pump_loop/project_index.yaml
      - templates/test_file_contract.yaml
      - docs/test_file_contracts.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_test_file_contract_checks.py
        covers: Optional route, manifest gate, evidence-backed mapping, model-gap, review-required, and contract-pass claim gates.
      - command: python -m pytest tests/test_test_file_contract_schema.py tests/test_test_file_contract_core.py tests/test_test_file_contract_cli.py
        covers: Schemas, manifest extraction, fail-closed coverage, CLI commands, and contract diffing.
      - command: python -m physicsguard.cli testfile contract-check examples/testfile_contracts/pump_loop/contracts/clean_contract.yaml --pretty
        covers: Clean file-level contract pass.
      - command: python -m physicsguard.cli testfile project-check examples/testfile_contracts/pump_loop/project_index.yaml --pretty
        covers: Multi-contract project index checks.
    boundaries:
      - Test-file contracts are optional for model-only PhysicsGuard work.
      - A contract pass is coverage evidence, not physical correctness proof.
      - AI mapping edges without evidence must not be treated as covered.
      - Unknown model targets or uncovered fields require review, human evidence, or model extension.
      - Observed values must not be converted or mutated by coverage checks.
    stale_when:
      - Manifest, contract, model-binding, catalog, role, mapping-edge, or coverage-policy schemas change.
      - CLI command names or script entry points change.
      - Mapping evidence, review-required, planned-child-model, or claim-gate semantics change.

  - id: workflow.test_file_contract_development_process
    model_file: .flowguard/physicsguard_test_file_contract_development_model.py
    model_blocks:
      - ValidateOpenSpec
      - CheckFlowGuardModels
      - ImplementArtifacts
      - RunValidation
      - SyncLocalInstall
      - PrepareGitPublish
      - CreateRelease
    responsibility: >
      Govern the staged delivery process for the test-file contract upgrade:
      OpenSpec validation, executable FlowGuard models, implementation,
      docs/examples/skills, current validation, local package and installed skill
      sync, git publish readiness, and GitHub release creation.
    code_symbols:
      - .flowguard/physicsguard_test_file_contract_development_model.py::ValidateOpenSpec
      - .flowguard/physicsguard_test_file_contract_development_model.py::CheckFlowGuardModels
      - .flowguard/physicsguard_test_file_contract_development_model.py::SyncLocalInstall
      - .flowguard/physicsguard_test_file_contract_development_model.py::CreateRelease
      - scripts/check_installed_physicsguard_skills.py::check_installed_skills
    tests:
      - tests/test_installed_skill_sync.py
      - tests/test_model_code_ledger.py
    examples:
      - openspec/changes/add-test-file-contract-system/proposal.md
      - openspec/changes/add-test-file-contract-system/design.md
      - openspec/changes/add-test-file-contract-system/tasks.md
      - skill/physicsguard-test-file-contract-review/SKILL.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_test_file_contract_development_checks.py
        covers: Development-process gates before release claims.
      - command: openspec validate add-test-file-contract-system --strict
        covers: Requirement/spec/task artifact validity.
      - command: python scripts/check_installed_physicsguard_skills.py --json
        covers: Repository skill source matches installed Codex skill copies.
      - command: python scripts/check_model_code_ledger.py --json
        covers: Model-code ledger freshness for FlowGuard-owned code and tests.
    boundaries:
      - A GitHub release must not be claimed before current tests, FlowGuard checks, and local skill/package sync.
      - Background or stale validation output is not completion evidence.
      - Peer-agent changes must be preserved and revalidated if they touch covered artifacts.
    stale_when:
      - OpenSpec artifacts, FlowGuard models, tests, scripts, skills, docs, version surfaces, local install sync, git publish, or release process changes.

  - id: workflow.model_dataset_validation
    model_file: .flowguard/physicsguard_model_dataset_validation_model.py
    model_blocks:
      - CheckContracts
      - RunDirectValidation
      - OptionalCalibration
      - GateValidationClaim
    responsibility: >
      Govern model-dataset validation after test-file contracts pass, including
      direct no-fit validation, conservative bounded calibration, holdout
      validation, confidence feedback, and the rule that optimizer convergence
      is not validation pass.
    code_symbols:
      - src/physicsguard/schema/dataset_identity.py::LogicalDatasetRecordSpec
      - src/physicsguard/schema/model_dataset_validation.py::ModelValidationPlanSpec
      - src/physicsguard/core/dataset_identity.py::check_logical_dataset_record
      - src/physicsguard/core/model_dataset_validation.py::validate_model_dataset
      - src/physicsguard/cli.py::validation_run_command
    tests:
      - tests/test_dataset_identity.py
      - tests/test_model_dataset_validation.py
      - tests/test_test_file_contract_cli.py
    examples:
      - examples/testfile_contracts/pump_loop/datasets/clean_logical_dataset.yaml
      - examples/testfile_contracts/pump_loop/relation_index.yaml
      - examples/testfile_contracts/pump_loop/validation/clean_validation_plan.yaml
      - templates/logical_dataset_record.yaml
      - templates/model_validation_plan.yaml
      - docs/dataset_identity.md
      - docs/model_dataset_validation.md
      - skill/physicsguard-model-dataset-validation/SKILL.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_model_dataset_validation_checks.py
        covers: Contract, direct validation, calibration, holdout, confidence feedback, and claim gates.
      - command: python -m pytest tests/test_dataset_identity.py tests/test_model_dataset_validation.py tests/test_test_file_contract_cli.py
        covers: Dataset identity, model validation, conservative calibration, and CLI routing.
    boundaries:
      - Raw data is referenced, not moved.
      - Non-identical test files keep symmetric contracts.
      - Calibration must not mutate observed values.
      - Optimizer convergence is separate from validation pass.
    stale_when:
      - Dataset identity, validation, calibration, confidence feedback, or CLI semantics change.

  - id: workflow.model_library
    model_file: .flowguard/physicsguard_model_library_model.py
    model_blocks:
      - CheckLibraryEntry
    responsibility: >
      Govern reusable model-library entries so validated or partial reuse status
      requires validation report evidence and raw datasets are not stored in the
      library.
    code_symbols:
      - src/physicsguard/schema/model_library.py::ModelLibraryIndexSpec
      - src/physicsguard/core/model_library.py::check_model_library_index
      - src/physicsguard/cli.py::model_library_check_command
    tests:
      - tests/test_model_library.py
      - tests/test_test_file_contract_cli.py
    examples:
      - examples/testfile_contracts/pump_loop/model_library.yaml
      - templates/model_library_index.yaml
      - docs/model_library.md
      - skill/physicsguard-model-library/SKILL.md
    validation_commands:
      - command: python .flowguard/run_physicsguard_model_library_checks.py
        covers: Model-library evidence gates.
      - command: python -m pytest tests/test_model_library.py tests/test_test_file_contract_cli.py
        covers: Model-library schema, core check, and CLI routing.
    boundaries:
      - Model library stores evidence references, not raw datasets.
      - Model library status is not proof outside referenced validation boundaries.
    stale_when:
      - Model library schema, CLI, evidence, or skill-route semantics change.
