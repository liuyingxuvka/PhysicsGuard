      - Non-snapshot closure requires passing native adequacy and compatible covered scope.
      - Prediction-ready closure requires stateful semantics, a passing native future-rollout receipt, and stability evidence.
      - Blocking evidence gaps, failed required route checks, or skipped required checks block broad claims.
      - Review gaps downgrade or limit claims and must remain visible.
    stale_when:
