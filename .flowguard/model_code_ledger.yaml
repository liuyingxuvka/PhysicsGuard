    validation_commands:
      - command: python .flowguard/run_physicsguard_model_dataset_validation_checks.py
        covers: Contract, direct validation, calibration, holdout, confidence feedback, and claim gates.
      - command: python .flowguard/run_physicsguard_validation_depth_checks.py
        covers: Dataset/mapping identity, honest scope, split isolation, series/envelope evidence, native receipt, field lifecycle, and process freshness gates.
      - command: python -m pytest tests/test_validation_depth_receipts.py -q
        covers: Stale identity, uncertain mapping, scope overclaim, split overlap, interval evidence, closure consumption, and receipt output.
      - command: python -m pytest tests/test_validation_adequacy.py tests/test_predictive_rollout_validation.py -q
        covers: Artifact-derived point/signal/parameter universes, strictest N-aware native/project/convergence floors, honest static binding, per-parameter row/time stages and gap limits, counterfactual model contribution, one-shallow-among-deep and 10000-parameter negatives, all sampling modes, pointwise prediction block, and stateful future-holdout metrics.
      - command: python -m pytest tests/test_guard_model_contract.py -q
        covers: Complete native object-scope reconciliation, precommitted per-object dynamic-floor receipts, ordinary versus critical-sentinel rows, and static/time-varying SkillGuard projection.
      - command: python -m pytest tests/test_dataset_identity.py tests/test_model_dataset_validation.py tests/test_test_file_contract_cli.py
        covers: Dataset identity, model validation, conservative calibration, and CLI routing.
    boundaries:
      - Raw data is referenced, not moved.
      - Non-identical test files keep symmetric contracts.
      - Calibration must not mutate observed values.
      - Optimizer convergence is separate from validation pass.
      - Blocking project evidence gaps prevent validation pass when a plan references an evidence bundle.
      - Scalar validation without depth remains snapshot-only and cannot support temporal or scenario understanding claims.
      - A selected subset does not define its own universe; non-snapshot claims require project-sourced quantitative adequacy over current target artifacts.
      - Every available parameter needs a source-backed static/time-varying classification; static uses binding-only evidence, while each time-varying parameter must pass the strictest N-aware native/plan/project/convergence floor plus raw-denominator time/gap/universal/project-stage gates.
      - Full aligned sequences use vectorized full-row validation; representative samples are predeclared, fingerprinted, bounded, and require per-parameter residual, observed-direction, physical-envelope, and executable counterfactual-contribution evidence or an explicit bounded non-sensitive disposition.
      - SkillGuard preserves every native raw row but marks only event, boundary, contribution, and other cannot-omit sentinels critical; it consumes rather than replaces the precommitted native per-object floor.
      - Pointwise validation cannot support prediction; prediction requires explicit stateful semantics and a disjoint future-holdout rollout.
      - Supervisory closure consumes the native receipt and does not recompute physical residuals.
    stale_when:
      - Dataset, schema, testbench, mapping, universe, adequacy, sampling, time, scenario, split, predictive rollout, residual, envelope, report identity, closure, or CLI semantics change.

