        covers: Snapshot/scope incompatibility and stateful prediction-ready receipt consumption.
      - command: python -m physicsguard.cli project closure examples/testfile_contracts/pump_loop/project_closure_plan.yaml --pretty
        covers: End-to-end pump-loop project closure with required evidence mesh.
    boundaries:
      - Project closure is current-run claim-readiness evidence, not a permanent registry field.
      - Project evidence maps are navigation only and cannot prove validation by themselves.
      - Required evidence mesh reports must pass before broad project closure claims can pass.
