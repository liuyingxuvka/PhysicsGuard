interface:
  display_name: "FlowGuard Model-First Kernel"
  short_description: "Route unclear work and build executable state models"
  default_prompt: "Use $flowguard for route_id=model_first_function_flow, role=kernel, native_owner=model_first_function_flow when ordinary behavior/state modeling, unclear ownership, cross-route coordination, or kernel-owned closure is needed; use a matching public owner directly when ownership is clear. For non-trivial existing-system work lightly query the shared BCL/model inventory, select or report one primary product_runtime/agent_operation/development_process plane, keep typed related planes as context, then require the real engine, Input x State modeling, known-bad proof, current evidence, and strict broad-claim gates. DevelopmentProcessFlow owns internal plan_detailing and agent_workflow routes with no separate skill, alias, forwarding entrypoint, or fallback. Let DevelopmentProcessFlow read current official OpenSpec proposal/design/spec/tasks/status only as read-only context, preserving provider validation/archive authority and never projecting provider-internal fields into product UI; do not force trivial actions through a model, turn related product rows into AI instructions, preempt a clear public owner, or create a fake/parallel controller; output evidence, failures, blockers, skipped_checks, residual_risk, claim_boundary, and typed_next_actions; claim only the current modeled and validated scope. When creating or materially changing a concrete model instance, first freeze task/instance-specific one-or-many protected failures and the claim boundary, then bind the exact candidate plus native good, per-failure bad, oracle, and current evidence; reusable model types are not permanently single-purpose; FlowGuard owns semantics and only declared checks may support completion claims."
