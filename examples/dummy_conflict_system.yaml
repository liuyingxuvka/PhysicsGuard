# PhysicsGuard system audit/model blueprint
# Purpose: Dummy framework test system with an intentional non-physical conflict.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/dummy_conflict_system.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: dummy_conflict_system
description: Dummy framework test system with an intentional non-physical conflict.
components:
  - id: a
    type: DummyResidualModule
    parameters:
      target: 5.0
      lower_bound: -100.0
      upper_bound: 100.0
      initial_guess: 0.0
      scale: 1.0
      unit: "1"
boundaries:
  - variable: a.x
    value: 10.0
    unit: "1"
    scale: 1.0
    description: Conflicts with the dummy target.
solver:
  method: least_squares
  max_iterations: 30
  audit_threshold: 1.0
  tolerance: 1.0e-8
  verbose: false
