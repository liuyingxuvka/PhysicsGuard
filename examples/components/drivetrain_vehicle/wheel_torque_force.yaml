# PhysicsGuard system audit/model blueprint
# Purpose: component wheel torque force.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/drivetrain_vehicle/wheel_torque_force.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_wheel_torque_force
components:
  - id: wheel
    type: WheelTorqueForceModule
    parameters: {}
boundaries:
  - {variable: wheel.wheel_torque_Nm, value: 300.0}
  - {variable: wheel.wheel_radius_m, value: 0.3}
  - {variable: wheel.longitudinal_force_N, value: 1000.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
