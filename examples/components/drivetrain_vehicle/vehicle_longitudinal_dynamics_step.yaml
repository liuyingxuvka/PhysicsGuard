system_name: component_vehicle_longitudinal_dynamics_step
components:
  - id: veh
    type: VehicleLongitudinalDynamicsStepModule
    parameters: {mass_kg: 1000.0, dt_s: 1.0}
boundaries:
  - {variable: veh.speed_previous_m_s, value: 20.0}
  - {variable: veh.drive_force_N, value: 1000.0}
  - {variable: veh.brake_force_N, value: 0.0}
  - {variable: veh.road_load_force_N, value: 500.0}
  - {variable: veh.speed_current_m_s, value: 20.5}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
