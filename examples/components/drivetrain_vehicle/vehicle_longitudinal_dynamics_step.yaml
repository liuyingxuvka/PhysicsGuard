# PhysicsGuard system audit/model blueprint
# Purpose: component vehicle longitudinal dynamics step.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/drivetrain_vehicle/vehicle_longitudinal_dynamics_step.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_vehicle_longitudinal_dynamics_step
components:
  - id: veh
    type: VehicleLongitudinalDynamicsStepModule
    parameters: {mass_kg: 1000.0, dt_s: 1.0}
boundaries:
  - {variable: veh.speed_previous_m_s, value: 20.0}
  - {variable: veh.drive_force_N, value: 1000.0}
  - {variable: veh.brake_force_N, value: 0.0}
  - {variable: veh.road_load_force_N, value: 500.0}
  - {variable: veh.speed_current_m_s, value: 20.5}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
