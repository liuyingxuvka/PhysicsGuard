# PhysicsGuard system audit/model blueprint
# Purpose: component vehicle road load.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/drivetrain_vehicle/vehicle_road_load.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_vehicle_road_load
components:
  - id: veh
    type: VehicleRoadLoadModule
    parameters: {mass_kg: 1500.0, C0_N: 100.0, C1_N_s_m: 1.0, C2_N_s2_m2: 0.5}
boundaries:
  - {variable: veh.vehicle_speed_m_s, value: 20.0}
  - {variable: veh.road_grade_rad, value: 0.0}
  - {variable: veh.road_load_force_N, value: 320.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
