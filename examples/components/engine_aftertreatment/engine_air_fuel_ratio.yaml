# PhysicsGuard system audit/model blueprint
# Purpose: component engine air fuel ratio.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/engine_aftertreatment/engine_air_fuel_ratio.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_engine_air_fuel_ratio
components:
  - id: afr
    type: EngineAirFuelRatioModule
    parameters: {}
boundaries:
  - {variable: afr.m_dot_air_kg_s, value: 0.1}
  - {variable: afr.m_dot_fuel_kg_s, value: 0.005}
  - {variable: afr.AFR, value: 20.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
