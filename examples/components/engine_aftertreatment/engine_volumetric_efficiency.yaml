# PhysicsGuard system audit/model blueprint
# Purpose: component engine volumetric efficiency.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/engine_aftertreatment/engine_volumetric_efficiency.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_engine_volumetric_efficiency
components:
  - id: ve
    type: EngineVolumetricEfficiencyModule
    parameters: {displacement_m3_per_rev: 0.002}
boundaries:
  - {variable: ve.speed_rev_s, value: 50.0}
  - {variable: ve.rho_air_kg_m3, value: 1.2}
  - {variable: ve.volumetric_efficiency, value: 0.8}
  - {variable: ve.m_dot_air_kg_s, value: 0.096}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
