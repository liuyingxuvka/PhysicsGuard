# PhysicsGuard system audit/model blueprint
# Purpose: component egr mixing.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/engine_aftertreatment/egr_mixing.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_egr_mixing
components:
  - id: egr
    type: EGRMixingModule
    parameters: {}
boundaries:
  - {variable: egr.m_dot_fresh_air_kg_s, value: 0.08}
  - {variable: egr.T_fresh_air_K, value: 300.0}
  - {variable: egr.m_dot_egr_kg_s, value: 0.02}
  - {variable: egr.T_egr_K, value: 700.0}
  - {variable: egr.m_dot_mixed_kg_s, value: 0.1}
  - {variable: egr.T_mixed_K, value: 380.0}
  - {variable: egr.egr_fraction, value: 0.2}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
