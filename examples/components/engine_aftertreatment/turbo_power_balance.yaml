# PhysicsGuard system audit/model blueprint
# Purpose: component turbo power balance.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/engine_aftertreatment/turbo_power_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_turbo_power_balance
components:
  - id: turbo
    type: TurboPowerBalanceModule
    parameters: {}
boundaries:
  - {variable: turbo.P_turbine_W, value: 10000.0}
  - {variable: turbo.mechanical_efficiency, value: 0.9}
  - {variable: turbo.P_compressor_W, value: 9000.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
