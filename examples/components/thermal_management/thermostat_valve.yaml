# PhysicsGuard system audit/model blueprint
# Purpose: component thermostat valve.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/thermal_management/thermostat_valve.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_thermostat_valve
components:
  - id: thermo
    type: ThermostatValveModule
    parameters: {T_begin_open_K: 350.0, T_full_open_K: 370.0}
boundaries:
  - {variable: thermo.T_control_K, value: 360.0}
  - {variable: thermo.opening, value: 0.5}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
