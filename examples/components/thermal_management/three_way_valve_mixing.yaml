# PhysicsGuard system audit/model blueprint
# Purpose: component three way valve mixing.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/thermal_management/three_way_valve_mixing.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_three_way_valve_mixing
components:
  - id: valve
    type: ThreeWayValveMixingModule
    parameters: {}
boundaries:
  - {variable: valve.m_dot_out_kg_s, value: 1.0}
  - {variable: valve.split_fraction, value: 0.4}
  - {variable: valve.m_dot_in_1_kg_s, value: 0.4}
  - {variable: valve.T_in_1_K, value: 300.0}
  - {variable: valve.m_dot_in_2_kg_s, value: 0.6}
  - {variable: valve.T_in_2_K, value: 320.0}
  - {variable: valve.T_out_K, value: 312.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
