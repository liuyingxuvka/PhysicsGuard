system_name: component_efficiency_map_2d
components:
  - id: map
    type: EfficiencyMap2DModule
    parameters:
      x_points: [0.0, 1.0]
      y_points: [0.0, 1.0]
      efficiency_values:
        - [0.7, 0.8]
        - [0.8, 0.9]
boundaries:
  - variable: map.x
    value: 0.5
  - variable: map.y
    value: 0.5
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
