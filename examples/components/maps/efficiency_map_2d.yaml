# PhysicsGuard system audit/model blueprint
# Purpose: component efficiency map 2d.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/maps/efficiency_map_2d.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_efficiency_map_2d
components:
  - id: map
    type: EfficiencyMap2DModule
    parameters:
      x_points: [0.0, 1.0]
      y_points: [0.0, 1.0]
      efficiency_values:
        - [0.7, 0.8]
        - [0.8, 0.9]
boundaries:
  - variable: map.x
    value: 0.5
  - variable: map.y
    value: 0.5
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
