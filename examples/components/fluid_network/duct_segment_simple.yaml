# PhysicsGuard system audit/model blueprint
# Purpose: component duct segment simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_network/duct_segment_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_duct_segment_simple
components:
  - id: duct
    type: DuctSegmentSimpleModule
    parameters: {rho_kg_m3: 1.2, area_m2: 0.1, K_total: 2.0}
boundaries:
  - {variable: duct.p_in_Pa, value: 100120.0}
  - {variable: duct.p_out_Pa, value: 100000.0}
  - {variable: duct.m_dot_kg_s, value: 1.2}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
