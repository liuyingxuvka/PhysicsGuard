system_name: component_throttle_valve_simple
components:
  - id: valve
    type: ThrottleValveSimpleModule
    parameters: {CdA_max_m2: 0.00003162277660168379, rho_kg_m3: 1000.0}
boundaries:
  - {variable: valve.p_upstream_Pa, value: 120000.0}
  - {variable: valve.p_downstream_Pa, value: 100000.0}
  - {variable: valve.opening, value: 0.5}
  - {variable: valve.m_dot_kg_s, value: 0.1}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
