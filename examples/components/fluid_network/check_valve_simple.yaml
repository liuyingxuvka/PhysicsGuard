# PhysicsGuard system audit/model blueprint
# Purpose: component check valve simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_network/check_valve_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_check_valve_simple
components:
  - id: valve
    type: CheckValveSimpleModule
    parameters: {}
boundaries:
  - {variable: valve.p_upstream_Pa, value: 120000.0}
  - {variable: valve.p_downstream_Pa, value: 100000.0}
  - {variable: valve.m_dot_kg_s, value: 0.1}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
