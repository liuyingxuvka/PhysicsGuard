# PhysicsGuard system audit/model blueprint
# Purpose: component pipe segment simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_network/pipe_segment_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_pipe_segment_simple
components:
  - id: pipe
    type: PipeSegmentSimpleModule
    parameters: {rho_kg_m3: 1000.0, diameter_m: 0.1, length_m: 10.0, friction_factor: 0.02, K_minor: 1.0}
boundaries:
  - {variable: pipe.p_in_Pa, value: 101800.0}
  - {variable: pipe.p_out_Pa, value: 100000.0}
  - {variable: pipe.m_dot_kg_s, value: 1.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
