system_name: component_conflict_flow_split
components:
  - id: split
    type: FlowSplitModule
    parameters: {residual_scale_kg_s: 0.001}
boundaries:
  - {variable: split.m_dot_in_kg_s, value: 1.0, scale: 0.000000001}
  - {variable: split.split_fraction, value: 0.4, scale: 0.000000001}
  - {variable: split.m_dot_out_1_kg_s, value: 0.9, scale: 0.000000001}
  - {variable: split.m_dot_out_2_kg_s, value: 0.6, scale: 0.000000001}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
