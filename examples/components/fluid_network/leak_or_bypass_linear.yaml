# PhysicsGuard system audit/model blueprint
# Purpose: component leak or bypass linear.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_network/leak_or_bypass_linear.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_leak_or_bypass_linear
components:
  - id: leak
    type: LeakOrBypassLinearModule
    parameters: {conductance_kg_s_Pa: 0.000001}
boundaries:
  - {variable: leak.p_upstream_Pa, value: 120000.0}
  - {variable: leak.p_downstream_Pa, value: 100000.0}
  - {variable: leak.m_dot_kg_s, value: 0.02}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
