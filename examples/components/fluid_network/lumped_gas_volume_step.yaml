# PhysicsGuard system audit/model blueprint
# Purpose: component lumped gas volume step.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_network/lumped_gas_volume_step.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_lumped_gas_volume_step
components:
  - id: gas
    type: LumpedGasVolumeStepModule
    parameters: {volume_m3: 1.0, dt_s: 1.0}
boundaries:
  - {variable: gas.p_previous_Pa, value: 100000.0}
  - {variable: gas.T_K, value: 300.0}
  - {variable: gas.n_dot_in_mol_s, value: 1.0}
  - {variable: gas.n_dot_out_mol_s, value: 0.5}
  - {variable: gas.p_current_Pa, value: 101247.1693927}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
