system_name: component_electrolyzer_polarization_map
components:
  - id: elmap
    type: ElectrolyzerPolarizationMapModule
    parameters:
      current_density_points_A_m2: [0.0, 2000.0]
      V_cell_points_V: [1.5, 1.9]
boundaries:
