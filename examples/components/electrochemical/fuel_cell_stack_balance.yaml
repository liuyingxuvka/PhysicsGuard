# PhysicsGuard system audit/model blueprint
# Purpose: component fuel cell stack balance.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/electrochemical/fuel_cell_stack_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_fuel_cell_stack_balance
components:
  - id: fc
    type: FuelCellStackBalanceModule
    parameters:
      n_cells: 400.0
      E_thermoneutral_V: 1.48
      faradaic_efficiency: 1.0
boundaries:
  - variable: fc.current_A
    value: 100.0
  - variable: fc.V_cell_V
    value: 0.7
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
