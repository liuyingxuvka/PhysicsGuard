# PhysicsGuard system audit/model blueprint
# Purpose: component fuel cell polarization map.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/electrochemical/fuel_cell_polarization_map.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_fuel_cell_polarization_map
components:
  - id: fcmap
    type: FuelCellPolarizationMapModule
    parameters:
      current_density_points_A_m2: [0.0, 2000.0]
      V_cell_points_V: [0.9, 0.7]
boundaries:
  - variable: fcmap.current_density_A_m2
    value: 1000.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
