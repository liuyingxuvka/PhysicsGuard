  - {variable: cathode.n_dot_O2_consumed_mol_s, value: 0.5, scale: 0.000000001}
  - {variable: cathode.oxygen_stoichiometry, value: 2.0, scale: 0.000000001}
  - {variable: cathode.n_dot_air_feed_mol_s, value: 0.9870695, scale: 0.000000001}
  - {variable: cathode.m_dot_air_feed_kg_s, value: 0.0285882, scale: 0.000000001}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
