# PhysicsGuard system audit/model blueprint
# Purpose: component battery soc step.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/battery_hv/battery_soc_step.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_battery_soc_step
components:
  - id: bat
    type: BatterySOCStepModule
    parameters: {capacity_C: 100000.0, dt_s: 10.0}
boundaries:
  - {variable: bat.SOC_previous, value: 0.8}
  - {variable: bat.current_A, value: 10.0}
  - {variable: bat.SOC_current, value: 0.799}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
