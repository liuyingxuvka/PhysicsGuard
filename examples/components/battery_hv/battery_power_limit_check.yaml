# PhysicsGuard system audit/model blueprint
# Purpose: component battery power limit check.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/battery_hv/battery_power_limit_check.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_battery_power_limit_check
components:
  - id: lim
    type: BatteryPowerLimitCheckModule
    parameters: {max_discharge_power_W: 5000.0, max_charge_power_W: 3000.0}
boundaries:
  - {variable: lim.power_W, value: 1000.0}
  - {variable: lim.SOC, value: 0.5}
  - {variable: lim.temperature_K, value: 300.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
