# PhysicsGuard system audit/model blueprint
# Purpose: component charger simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/battery_hv/charger_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_charger_simple
components:
  - id: charger
    type: ChargerSimpleModule
    parameters: {}
boundaries:
  - {variable: charger.P_grid_W, value: 10000.0}
  - {variable: charger.efficiency, value: 0.9}
  - {variable: charger.P_battery_W, value: 9000.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
