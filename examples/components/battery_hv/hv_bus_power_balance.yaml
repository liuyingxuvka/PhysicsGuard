system_name: component_hv_bus_power_balance
components:
  - id: src
    type: DummyResidualModule
    parameters: {target: 5000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 5000.0, scale: 1000.0}
  - id: load
    type: DummyResidualModule
    parameters: {target: 3000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 3000.0, scale: 1000.0}
  - id: batt
    type: DummyResidualModule
    parameters: {target: 2000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 2000.0, scale: 1000.0}
  - id: bus
    type: HVBusPowerBalanceModule
    parameters:
      source_power_variables: [src.x]
      load_power_variables: [load.x]
      storage_power_variables: [batt.x]
boundaries:
  - {variable: src.x, value: 5000.0}
  - {variable: load.x, value: 3000.0}
  - {variable: batt.x, value: 2000.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
