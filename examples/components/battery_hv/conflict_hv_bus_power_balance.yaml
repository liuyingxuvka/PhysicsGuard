# PhysicsGuard system audit/model blueprint
# Purpose: component conflict hv bus power balance.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/battery_hv/conflict_hv_bus_power_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_conflict_hv_bus_power_balance
components:
  - id: src
    type: DummyResidualModule
    parameters: {target: 5000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 5000.0, scale: 1000.0}
  - id: load
    type: DummyResidualModule
    parameters: {target: 3000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 3000.0, scale: 1000.0}
  - id: batt
    type: DummyResidualModule
    parameters: {target: 1000.0, lower_bound: 0.0, upper_bound: 10000.0, initial_guess: 1000.0, scale: 1000.0}
  - id: bus
    type: HVBusPowerBalanceModule
    parameters:
      source_power_variables: [src.x]
      load_power_variables: [load.x]
      storage_power_variables: [batt.x]
      residual_scale_W: 100.0
boundaries:
  - {variable: src.x, value: 5000.0, scale: 0.000000001}
  - {variable: load.x, value: 3000.0, scale: 0.000000001}
  - {variable: batt.x, value: 1000.0, scale: 0.000000001}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
