# PhysicsGuard system audit/model blueprint
# Purpose: component humidifier effectiveness.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/thermal/humidifier_effectiveness.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_humidifier_effectiveness
components:
  - id: hum
    type: HumidifierEffectivenessModule
    parameters:
      effectiveness: 0.5
boundaries:
  - variable: hum.m_dot_dry_air_kg_s
    value: 1.0
  - variable: hum.humidity_ratio_in_kg_kg
    value: 0.01
  - variable: hum.humidity_ratio_target_kg_kg
    value: 0.03
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
