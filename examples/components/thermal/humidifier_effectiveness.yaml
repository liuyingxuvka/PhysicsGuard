system_name: component_humidifier_effectiveness
components:
  - id: hum
    type: HumidifierEffectivenessModule
    parameters:
      effectiveness: 0.5
boundaries:
  - variable: hum.m_dot_dry_air_kg_s
    value: 1.0
  - variable: hum.humidity_ratio_in_kg_kg
    value: 0.01
  - variable: hum.humidity_ratio_target_kg_kg
    value: 0.03
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
