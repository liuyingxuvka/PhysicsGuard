# PhysicsGuard system audit/model blueprint
# Purpose: component conflict radiator simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/thermal/conflict_radiator_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_conflict_radiator_simple
components:
  - id: rad
    type: RadiatorSimpleModule
    parameters:
      cp_coolant_J_kgK: 1000.0
      UA_W_K: 333.3333333333333
boundaries:
  - variable: rad.m_dot_coolant_kg_s
    value: 1.0
    scale: 0.001
  - variable: rad.T_coolant_in_K
    value: 330.0
    scale: 0.001
  - variable: rad.T_coolant_out_K
    value: 320.0
    scale: 0.001
  - variable: rad.T_air_in_K
    value: 300.0
    scale: 0.001
  - variable: rad.Q_rejected_W
    value: 20000.0
    scale: 0.001
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
