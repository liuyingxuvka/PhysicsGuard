# PhysicsGuard system audit/model blueprint
# Purpose: component pump simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/fluid_machines/pump_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_pump_simple
components:
  - id: pump
    type: PumpSimpleModule
    parameters:
      rho_kg_m3: 1000.0
boundaries:
  - variable: pump.p_in_Pa
    value: 100000.0
  - variable: pump.p_out_Pa
    value: 200000.0
  - variable: pump.m_dot_kg_s
    value: 1.0
  - variable: pump.efficiency
    value: 0.8
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
