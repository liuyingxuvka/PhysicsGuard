system_name: component_pump_map_simple
components:
  - id: pump
    type: PumpMapSimpleModule
    parameters:
      speed_points: [100.0, 200.0]
      flow_points: [1.0, 2.0]
      delta_p_values:
        - [100000.0, 200000.0]
        - [150000.0, 300000.0]
      efficiency_values:
        - [0.8, 0.82]
        - [0.78, 0.8]
      rho_kg_m3: 997.0
boundaries:
  - variable: pump.speed_rad_s
    value: 100.0
  - variable: pump.m_dot_kg_s
    value: 1.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
