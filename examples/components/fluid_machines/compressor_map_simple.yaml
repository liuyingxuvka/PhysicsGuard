system_name: component_compressor_map_simple
components:
  - id: comp
    type: CompressorMapSimpleModule
    parameters:
      speed_points: [0.0, 2.0]
      flow_points: [0.0, 2.0]
      pressure_ratio_values:
        - [1.0, 2.0]
        - [1.5, 2.5]
      efficiency_values:
        - [0.7, 0.75]
        - [0.75, 0.8]
      cp_J_kgK: 1000.0
      gamma: 1.4
boundaries:
  - variable: comp.corrected_speed
    value: 1.0
  - variable: comp.corrected_mass_flow
    value: 1.0
  - variable: comp.p_in_Pa
    value: 100000.0
  - variable: comp.T_in_K
    value: 300.0
  - variable: comp.m_dot_kg_s
    value: 0.1
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
