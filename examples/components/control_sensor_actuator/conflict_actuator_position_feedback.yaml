# PhysicsGuard system audit/model blueprint
# Purpose: component conflict actuator position feedback.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/conflict_actuator_position_feedback.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_conflict_actuator_position_feedback
components:
  - id: act
    type: ActuatorPositionFeedbackModule
    parameters: {command_to_position_gain: 2.0, feedback_gain: 0.5, feedback_offset: 1.0, residual_scale_position: 0.01}
boundaries:
  - {variable: act.command, value: 3.0, scale: 0.000000001}
  - {variable: act.actual_position, value: 9.0, scale: 0.000000001}
  - {variable: act.feedback_position, value: 4.0, scale: 0.000000001}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
