# PhysicsGuard system audit/model blueprint
# Purpose: component map axis bounds check.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/map_axis_bounds_check.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_map_axis_bounds_check
components:
  - id: sig
    type: DummyResidualModule
    parameters: {target: 0.5}
  - id: bounds
    type: MapAxisBoundsCheckModule
    parameters:
      variables: [sig.x]
      lower_bounds: [0.0]
      upper_bounds: [1.0]
boundaries:
  - {variable: sig.x, value: 0.5}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
