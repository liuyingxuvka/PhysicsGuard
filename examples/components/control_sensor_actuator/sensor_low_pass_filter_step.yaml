# PhysicsGuard system audit/model blueprint
# Purpose: component sensor low pass filter step.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/sensor_low_pass_filter_step.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_sensor_low_pass_filter_step
components:
  - id: sensor
    type: SensorLowPassFilterStepModule
    parameters: {tau_s: 2.0, dt_s: 1.0}
boundaries:
  - {variable: sensor.true_value_current, value: 10.0}
  - {variable: sensor.measured_previous, value: 6.0}
  - {variable: sensor.measured_current, value: 8.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
