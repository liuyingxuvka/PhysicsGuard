# PhysicsGuard system audit/model blueprint
# Purpose: component actuator dead zone.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/actuator_dead_zone.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_actuator_dead_zone
components:
  - id: act
    type: ActuatorDeadZoneModule
    parameters: {dead_zone: 0.1, gain: 2.0}
boundaries:
  - {variable: act.command, value: 0.4}
  - {variable: act.output, value: 0.6}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
