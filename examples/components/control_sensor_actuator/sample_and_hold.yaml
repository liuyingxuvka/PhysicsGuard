# PhysicsGuard system audit/model blueprint
# Purpose: component sample and hold.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/sample_and_hold.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_sample_and_hold
components:
  - id: sh
    type: SampleAndHoldModule
    parameters: {}
boundaries:
  - {variable: sh.input_current, value: 10.0}
  - {variable: sh.output_previous, value: 7.0}
  - {variable: sh.hold_flag, value: 1.0}
  - {variable: sh.output_current, value: 7.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
