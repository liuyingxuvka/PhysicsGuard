# PhysicsGuard system audit/model blueprint
# Purpose: component conflict unit conversion audit.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/conflict_unit_conversion_audit.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_conflict_unit_conversion_audit
components:
  - id: conv
    type: UnitConversionAuditModule
    parameters: {factor: 100000.0, source_unit: bar, target_unit: Pa, residual_scale: 1.0}
boundaries:
  - {variable: conv.source_value, value: 2.0, scale: 0.000000001}
  - {variable: conv.target_value, value: 2.0, scale: 0.000000001}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
