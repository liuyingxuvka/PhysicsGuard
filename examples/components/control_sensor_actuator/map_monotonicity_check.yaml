# PhysicsGuard system audit/model blueprint
# Purpose: component map monotonicity check.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/control_sensor_actuator/map_monotonicity_check.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_map_monotonicity_check
components:
  - id: d
    type: DummyResidualModule
    parameters: {target: 0.0}
  - id: mono
    type: MapMonotonicityCheckModule
    parameters:
      values: [1.0, 2.0, 3.0]
      expected: increasing
boundaries:
  - {variable: d.x, value: 0.0}
solver: {tolerance: 1.0e-8, audit_threshold: 1.0}
