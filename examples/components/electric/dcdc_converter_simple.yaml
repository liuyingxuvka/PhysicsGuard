# PhysicsGuard system audit/model blueprint
# Purpose: component dcdc converter simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/electric/dcdc_converter_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_dcdc_converter_simple
components:
  - id: dcdc
    type: DCDCConverterSimpleModule
    parameters: {}
boundaries:
  - variable: dcdc.V_in_V
    value: 400.0
  - variable: dcdc.I_in_A
    value: 10.0
  - variable: dcdc.V_out_V
    value: 200.0
  - variable: dcdc.I_out_A
    value: 18.0
  - variable: dcdc.efficiency
    value: 0.9
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
