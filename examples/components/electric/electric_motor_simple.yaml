# PhysicsGuard system audit/model blueprint
# Purpose: component electric motor simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/electric/electric_motor_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_electric_motor_simple
components:
  - id: motor
    type: ElectricMotorSimpleModule
    parameters: {}
boundaries:
  - variable: motor.voltage_V
    value: 400.0
  - variable: motor.current_A
    value: 10.0
  - variable: motor.torque_Nm
    value: 30.0
  - variable: motor.omega_rad_s
    value: 100.0
  - variable: motor.efficiency
    value: 0.75
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
