# PhysicsGuard system audit/model blueprint
# Purpose: component conflict electric motor simple.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/components/electric/conflict_electric_motor_simple.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: component_conflict_electric_motor_simple
components:
  - id: motor
    type: ElectricMotorSimpleModule
    parameters: {}
boundaries:
  - variable: motor.voltage_V
    value: 400.0
    scale: 0.001
  - variable: motor.current_A
    value: 10.0
    scale: 0.001
  - variable: motor.electrical_power_W
    value: 4000.0
    scale: 0.001
  - variable: motor.torque_Nm
    value: 30.0
    scale: 0.001
  - variable: motor.omega_rad_s
    value: 100.0
    scale: 0.001
  - variable: motor.mechanical_power_W
    value: 3000.0
    scale: 0.001
  - variable: motor.efficiency
    value: 0.2
    scale: 0.001
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
