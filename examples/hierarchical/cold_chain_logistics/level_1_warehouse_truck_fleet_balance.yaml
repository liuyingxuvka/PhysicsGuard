# PhysicsGuard hierarchical audit/model blueprint
# Purpose: Level 0 coarse cold-chain logistics audit for warehouse heat, truck cooling, and fleet power.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli hierarchy run examples/hierarchical/cold_chain_logistics/level_1_warehouse_truck_fleet_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
audit_name: cold_chain_logistics_level_1
description: Level 0 coarse cold-chain logistics audit for warehouse heat, truck cooling,
  and fleet power.
system:
  system_name: cold_chain_logistics_level_1
  components:
  - id: warehouse_refrigeration_capacity
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 200000.0
      scale: 20000.0
      external_signal: mapped_warehouse_refrigeration_capacity
      mapping_confidence: template
  - id: product_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 120000.0
      scale: 12000.0
      external_signal: mapped_product_heat_gain
      mapping_confidence: template
  - id: door_infiltration_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 50000.0
      scale: 5000.0
      external_signal: mapped_door_infiltration_heat_gain
      mapping_confidence: template
  - id: envelope_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 30000.0
      scale: 3000.0
      external_signal: mapped_envelope_heat_gain
      mapping_confidence: template
  - id: warehouse_thermal_accounting_thermal_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables:
      - warehouse_refrigeration_capacity.value
      heat_out_variables:
      - product_heat_gain.value
      - door_infiltration_heat_gain.value
      - envelope_heat_gain.value
      residual_scale_W: 100.0
  - id: truck_cooling_capacity
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 50000.0
      scale: 5000.0
      external_signal: mapped_truck_cooling_capacity
      mapping_confidence: template
  - id: cargo_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 30000.0
      scale: 3000.0
      external_signal: mapped_cargo_heat_gain
      mapping_confidence: template
  - id: truck_ambient_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 20000.0
      scale: 2000.0
      external_signal: mapped_truck_ambient_heat_gain
      mapping_confidence: template
  - id: truck_cooling_accounting_thermal_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables:
      - truck_cooling_capacity.value
      heat_out_variables:
      - cargo_heat_gain.value
      - truck_ambient_heat_gain.value
      residual_scale_W: 100.0
  - id: cold_chain_facility_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 100000.0
      scale: 10000.0
      external_signal: mapped_cold_chain_facility_power
      mapping_confidence: template
  - id: refrigeration_electric_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 80000.0
      scale: 8000.0
      external_signal: mapped_refrigeration_electric_power
      mapping_confidence: template
  - id: auxiliary_logistics_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 20000.0
      scale: 2000.0
      external_signal: mapped_auxiliary_logistics_power
      mapping_confidence: template
  - id: fleet_power_accounting_power_balance
    type: AggregatePowerBalanceModule
    parameters:
      source_power_variables:
      - cold_chain_facility_power.value
      load_power_variables:
      - refrigeration_electric_power.value
      - auxiliary_logistics_power.value
      residual_scale_W: 100.0
  boundaries:
  - variable: warehouse_refrigeration_capacity.value
    value: 200000.0
    scale: 1.0e-06
  - variable: product_heat_gain.value
    value: 120000.0
    scale: 1.0e-06
  - variable: door_infiltration_heat_gain.value
    value: 50000.0
    scale: 1.0e-06
  - variable: envelope_heat_gain.value
    value: 30000.0
    scale: 1.0e-06
  - variable: truck_cooling_capacity.value
    value: 50000.0
    scale: 1.0e-06
  - variable: cargo_heat_gain.value
    value: 30000.0
    scale: 1.0e-06
  - variable: truck_ambient_heat_gain.value
    value: 20000.0
    scale: 1.0e-06
  - variable: cold_chain_facility_power.value
    value: 100000.0
    scale: 1.0e-06
  - variable: refrigeration_electric_power.value
    value: 80000.0
    scale: 1.0e-06
  - variable: auxiliary_logistics_power.value
    value: 20000.0
    scale: 1.0e-06
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: cold_chain_logistics
    name: Cold chain logistics
    level: 0
    tags:
    - cold_chain_logistics
  - id: warehouse_thermal_accounting
    name: Warehouse thermal accounting
    level: 1
    parent_id: cold_chain_logistics
    components:
    - warehouse_refrigeration_capacity
    - product_heat_gain
    - door_infiltration_heat_gain
    - envelope_heat_gain
    - warehouse_thermal_accounting_thermal_balance
    tags:
    - warehouse
    - thermal
    required_variables:
    - warehouse_refrigeration_capacity.value
  - id: truck_cooling_accounting
    name: Truck cooling accounting
    level: 1
    parent_id: cold_chain_logistics
    components:
    - truck_cooling_capacity
    - cargo_heat_gain
    - truck_ambient_heat_gain
    - truck_cooling_accounting_thermal_balance
    tags:
    - truck
    - cooling
    required_variables:
    - truck_cooling_capacity.value
  - id: fleet_power_accounting
    name: Fleet power accounting
    level: 1
    parent_id: cold_chain_logistics
    components:
    - cold_chain_facility_power
    - refrigeration_electric_power
    - auxiliary_logistics_power
    - fleet_power_accounting_power_balance
    tags:
    - fleet
    - power
    required_variables:
    - cold_chain_facility_power.value
  refinement_rules:
  - id: refine_warehouse_thermal_accounting
    block_id: warehouse_thermal_accounting
    trigger_diagnostic_keys:
    - aggregate_thermal_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids:
    - cold_chain_logistics/level_2_warehouse_thermal_accounting_placeholder
    next_required_variables:
    - warehouse_refrigeration_capacity.value
    - product_heat_gain.value
    - door_infiltration_heat_gain.value
    - envelope_heat_gain.value
    next_required_parameters: &id001
    - door_opening_boundary
    - cargo_heat_basis
    - fleet_meter_grouping
    rationale: Warehouse thermal residual is high; inspect door, product, and envelope
      heat-gain boundaries before adding thermal detail.
    priority: 10
  - id: refine_truck_cooling_accounting
    block_id: truck_cooling_accounting
    trigger_diagnostic_keys:
    - aggregate_thermal_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids:
    - cold_chain_logistics/level_2_truck_cooling_accounting_placeholder
    next_required_variables:
    - truck_cooling_capacity.value
    - cargo_heat_gain.value
    - truck_ambient_heat_gain.value
    next_required_parameters: *id001
    rationale: Truck cooling residual is high; inspect cargo and ambient heat-gain
      boundaries before adding route detail.
    priority: 10
  - id: refine_fleet_power_accounting
    block_id: fleet_power_accounting
    trigger_diagnostic_keys:
    - aggregate_power_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids:
    - cold_chain_logistics/level_2_fleet_power_accounting_placeholder
    next_required_variables:
    - cold_chain_facility_power.value
    - refrigeration_electric_power.value
    - auxiliary_logistics_power.value
    next_required_parameters: *id001
    rationale: Fleet power residual is high; inspect meter grouping before adding
      equipment maps.
    priority: 10
  scoring:
    method: max
metadata:
  template_level: 1
  domain: cold_chain_logistics
  assumptions:
  - Cold-chain heat gains and refrigeration powers are mapped accounting terms; no
    detailed cargo thermal model, route model, or refrigeration map is inferred.
  - This template is a steady snapshot low-fidelity audit over mapped SI signals.
  - All assumptions, sign conventions, and metering boundaries must be explicit before
    interpreting residuals.
  - No high-fidelity simulator, calibrated performance map, or commercial-tool-equivalent
    behavior is implemented.
