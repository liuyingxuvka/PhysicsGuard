# PhysicsGuard hierarchical audit/model blueprint
# Purpose: Level 0 coarse medical/bioprocess equipment audit for ventilator flow, dialysis flow, sterilizer heat, and incubator temperature.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli hierarchy run examples/hierarchical/medical_bioprocess_equipment/level_0_medical_bioprocess_equipment_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
audit_name: medical_bioprocess_equipment_level_0
description: Level 0 coarse medical/bioprocess equipment audit for ventilator flow,
  dialysis flow, sterilizer heat, and incubator temperature.
system:
  system_name: medical_bioprocess_equipment_level_0
  components:
  - id: ventilator_supply_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 0.1
      scale: 1.0
      external_signal: mapped_ventilator_supply_mass_flow
      mapping_confidence: template
  - id: patient_delivery_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 0.09
      scale: 1.0
      external_signal: mapped_patient_delivery_mass_flow
      mapping_confidence: template
  - id: ventilator_leak_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 0.01
      scale: 1.0
      external_signal: mapped_ventilator_leak_mass_flow
      mapping_confidence: template
  - id: ventilator_flow_accounting_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables:
      - ventilator_supply_mass_flow.value
      mass_out_variables:
      - patient_delivery_mass_flow.value
      - ventilator_leak_mass_flow.value
      residual_scale_kg_s: 0.01
  - id: dialysate_inlet_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 0.2
      scale: 1.0
      external_signal: mapped_dialysate_inlet_mass_flow
      mapping_confidence: template
  - id: dialysate_outlet_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 0.2
      scale: 1.0
      external_signal: mapped_dialysate_outlet_mass_flow
      mapping_confidence: template
  - id: dialysis_fluid_accounting_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables:
      - dialysate_inlet_mass_flow.value
      mass_out_variables:
      - dialysate_outlet_mass_flow.value
      residual_scale_kg_s: 0.01
  - id: heater_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 500.0
      scale: 50.0
      external_signal: mapped_heater_power
      mapping_confidence: template
  - id: useful_chamber_heat
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 400.0
      scale: 40.0
      external_signal: mapped_useful_chamber_heat
      mapping_confidence: template
  - id: wall_heat_loss
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 100.0
      scale: 10.0
      external_signal: mapped_wall_heat_loss
      mapping_confidence: template
  - id: incubator_temperature
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: K
      lower_bound: 200.0
      upper_bound: 500.0
      initial_guess: 310.0
      scale: 1.0
      external_signal: mapped_incubator_temperature
      mapping_confidence: template
  - id: sterilizer_incubator_thermal_thermal_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables:
      - heater_power.value
      heat_out_variables:
      - useful_chamber_heat.value
      - wall_heat_loss.value
      residual_scale_W: 100.0
  - id: incubator_temperature_range
    type: RangeCheckModule
    parameters:
      variable: incubator_temperature.value
      lower_bound: 290.0
      upper_bound: 330.0
      residual_scale: 1.0
      role: post_check
  boundaries:
  - variable: ventilator_supply_mass_flow.value
    value: 0.1
    scale: 1.0e-06
  - variable: patient_delivery_mass_flow.value
    value: 0.09
    scale: 1.0e-06
  - variable: ventilator_leak_mass_flow.value
    value: 0.01
    scale: 1.0e-06
  - variable: dialysate_inlet_mass_flow.value
    value: 0.2
    scale: 1.0e-06
  - variable: dialysate_outlet_mass_flow.value
    value: 0.2
    scale: 1.0e-06
  - variable: heater_power.value
    value: 500.0
    scale: 1.0e-06
  - variable: useful_chamber_heat.value
    value: 400.0
    scale: 1.0e-06
  - variable: wall_heat_loss.value
    value: 100.0
    scale: 1.0e-06
  - variable: incubator_temperature.value
    value: 310.0
    scale: 1.0e-06
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: medical_bioprocess_equipment
    name: Medical and bioprocess equipment
    level: 0
    components:
    - ventilator_supply_mass_flow
    - patient_delivery_mass_flow
    - ventilator_leak_mass_flow
    - ventilator_flow_accounting_mass_balance
    - dialysate_inlet_mass_flow
    - dialysate_outlet_mass_flow
    - dialysis_fluid_accounting_mass_balance
    - heater_power
    - useful_chamber_heat
    - wall_heat_loss
    - incubator_temperature
    - sterilizer_incubator_thermal_thermal_balance
    - incubator_temperature_range
    tags:
    - medical_bioprocess_equipment
    - level_0
    - medical
    - bioprocess
    - equipment
    required_variables:
    - ventilator_supply_mass_flow.value
    refinement_template_ids:
    - medical_bioprocess_equipment/level_1_ventilator_dialysis_sterilizer_incubator
  refinement_rules:
  - id: refine_medical_bioprocess_equipment_level_0
    block_id: medical_bioprocess_equipment
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - aggregate_thermal_balance_mismatch
    - range_check_violation
    - ratio_relation_mismatch
    score_threshold: 1.0
    next_template_ids:
    - medical_bioprocess_equipment/level_1_ventilator_dialysis_sterilizer_incubator
    next_required_variables:
    - ventilator.supply_kg_s
    - ventilator.patient_kg_s
    - dialysis.flow_kg_s
    - incubator.temperature_K
    next_required_parameters:
    - ventilator_flow_boundary
    - dialysis_meter_boundary
    - sterilizer_heat_boundary
    rationale: Coarse medical-equipment residual is high; refine ventilator, dialysis,
      heat, and incubator checks before adding device-specific detail.
    priority: 10
  scoring:
    method: max
metadata:
  template_level: 0
  domain: medical_bioprocess_equipment
  assumptions:
  - Medical equipment templates are engineering signal audits only; they are not clinical
    guidance, safety certification, or device-performance models.
  - This template is a steady snapshot low-fidelity audit over mapped SI signals.
  - All assumptions, sign conventions, and metering boundaries must be explicit before
    interpreting residuals.
  - No high-fidelity simulator, calibrated performance map, or commercial-tool-equivalent
    behavior is implemented.
