audit_name: agriculture_food_bioprocess_level_1_greenhouse_irrigation_fermentation_drying_cold_chain
description: Level 1 agriculture, food, and bioprocess audit for greenhouse climate, irrigation water, CO2 accounting, fermentation, drying, and cold-chain storage blocks.
system:
  system_name: agriculture_food_bioprocess_level_1_greenhouse_irrigation_fermentation_drying_cold_chain
  components:
  - id: irrigation_supply_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 10.0, scale: 10.0, external_signal: mapped_irrigation_supply_mass_flow, mapping_confidence: template}
  - id: crop_evapotranspiration_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 6.5, scale: 10.0, external_signal: mapped_crop_evapotranspiration_mass_flow, mapping_confidence: template}
  - id: drainage_return_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 2.5, scale: 1.0, external_signal: mapped_drainage_return_mass_flow, mapping_confidence: template}
  - id: crop_water_storage_rate
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: -1000000.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_crop_water_storage_rate, mapping_confidence: template}
  - id: drainage_return_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.25, scale: 0.1, external_signal: mapped_drainage_return_fraction, mapping_confidence: template}
  - id: root_zone_water_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.4, scale: 0.1, external_signal: mapped_root_zone_water_fraction, mapping_confidence: template}
  - id: solar_heat_gain
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 50000.0, scale: 10000.0, external_signal: mapped_solar_heat_gain, mapping_confidence: template}
  - id: greenhouse_heating_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 20000.0, scale: 10000.0, external_signal: mapped_greenhouse_heating_power, mapping_confidence: template}
  - id: greenhouse_transmission_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 45000.0, scale: 10000.0, external_signal: mapped_greenhouse_transmission_loss, mapping_confidence: template}
  - id: greenhouse_ventilation_heat_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 25000.0, scale: 10000.0, external_signal: mapped_greenhouse_ventilation_heat_loss, mapping_confidence: template}
  - id: greenhouse_air_temperature
    type: MappedSignalModule
    parameters: {local_name: value, unit: K, lower_bound: 250.0, upper_bound: 330.0, initial_guess: 295.15, scale: 10.0, external_signal: mapped_greenhouse_air_temperature, mapping_confidence: template}
  - id: co2_supply_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 2.0, scale: 1.0, external_signal: mapped_co2_supply_molar_flow, mapping_confidence: template}
  - id: co2_plant_uptake_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 1.5, scale: 1.0, external_signal: mapped_co2_plant_uptake_molar_flow, mapping_confidence: template}
  - id: co2_vent_loss_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 0.5, scale: 0.1, external_signal: mapped_co2_vent_loss_molar_flow, mapping_confidence: template}
  - id: greenhouse_co2_mol_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 0.1, initial_guess: 0.001, scale: 0.001, external_signal: mapped_greenhouse_co2_mol_fraction, mapping_confidence: template}
  - id: fermentation_substrate_feed_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 4.0, scale: 1.0, external_signal: mapped_fermentation_substrate_feed_mass_flow, mapping_confidence: template}
  - id: fermentation_product_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 3.0, scale: 1.0, external_signal: mapped_fermentation_product_mass_flow, mapping_confidence: template}
  - id: fermentation_offgas_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 0.5, scale: 0.1, external_signal: mapped_fermentation_offgas_mass_flow, mapping_confidence: template}
  - id: fermentation_biomass_purge_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 0.5, scale: 0.1, external_signal: mapped_fermentation_biomass_purge_mass_flow, mapping_confidence: template}
  - id: fermentation_product_yield
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.75, scale: 0.1, external_signal: mapped_fermentation_product_yield, mapping_confidence: template}
  - id: fermentation_heat_release
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 25000.0, scale: 10000.0, external_signal: mapped_fermentation_heat_release, mapping_confidence: template}
  - id: fermentation_cooling_duty
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 22000.0, scale: 10000.0, external_signal: mapped_fermentation_cooling_duty, mapping_confidence: template}
  - id: fermentation_jacket_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 3000.0, scale: 1000.0, external_signal: mapped_fermentation_jacket_loss, mapping_confidence: template}
  - id: fermentation_reactor_temperature
    type: MappedSignalModule
    parameters: {local_name: value, unit: K, lower_bound: 250.0, upper_bound: 400.0, initial_guess: 303.15, scale: 10.0, external_signal: mapped_fermentation_reactor_temperature, mapping_confidence: template}
  - id: wet_product_feed_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 5.0, scale: 1.0, external_signal: mapped_wet_product_feed_mass_flow, mapping_confidence: template}
  - id: dry_product_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 4.0, scale: 1.0, external_signal: mapped_dry_product_mass_flow, mapping_confidence: template}
  - id: dryer_water_evaporation_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_dryer_water_evaporation_mass_flow, mapping_confidence: template}
  - id: dryer_exhaust_water_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_dryer_exhaust_water_mass_flow, mapping_confidence: template}
  - id: dryer_heat_input
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 60000.0, scale: 10000.0, external_signal: mapped_dryer_heat_input, mapping_confidence: template}
  - id: dryer_product_heat_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 45000.0, scale: 10000.0, external_signal: mapped_dryer_product_heat_loss, mapping_confidence: template}
  - id: dryer_exhaust_heat_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 15000.0, scale: 10000.0, external_signal: mapped_dryer_exhaust_heat_loss, mapping_confidence: template}
  - id: dried_product_moisture_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.125, scale: 0.1, external_signal: mapped_dried_product_moisture_fraction, mapping_confidence: template}
  - id: cold_room_cooling_capacity
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 30000.0, scale: 10000.0, external_signal: mapped_cold_room_cooling_capacity, mapping_confidence: template}
  - id: cold_room_product_heat_gain
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 15000.0, scale: 10000.0, external_signal: mapped_cold_room_product_heat_gain, mapping_confidence: template}
  - id: cold_room_infiltration_heat_gain
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 10000.0, scale: 10000.0, external_signal: mapped_cold_room_infiltration_heat_gain, mapping_confidence: template}
  - id: cold_room_door_heat_gain
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 5000.0, scale: 1000.0, external_signal: mapped_cold_room_door_heat_gain, mapping_confidence: template}
  - id: cold_room_temperature
    type: MappedSignalModule
    parameters: {local_name: value, unit: K, lower_bound: 250.0, upper_bound: 330.0, initial_guess: 277.15, scale: 10.0, external_signal: mapped_cold_room_temperature, mapping_confidence: template}
  - id: cold_room_refrigeration_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 10000.0, scale: 10000.0, external_signal: mapped_cold_room_refrigeration_power, mapping_confidence: template}
  - id: cold_room_cop
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 20.0, initial_guess: 3.0, scale: 1.0, external_signal: mapped_cold_room_cop, mapping_confidence: template}
  - id: irrigation_water_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [irrigation_supply_mass_flow.value]
      mass_out_variables: [crop_evapotranspiration_mass_flow.value, drainage_return_mass_flow.value]
      mass_storage_rate_variable: crop_water_storage_rate.value
      residual_scale_kg_s: 0.01
  - id: drainage_fraction_check
    type: RatioModule
    parameters:
      numerator_variable: drainage_return_mass_flow.value
      denominator_variable: irrigation_supply_mass_flow.value
      output_variable: drainage_return_fraction.value
      residual_scale: 0.01
  - id: root_zone_water_range
    type: RangeCheckModule
    parameters: {variable: root_zone_water_fraction.value, lower_bound: 0.05, upper_bound: 0.9, residual_scale: 0.01, role: post_check}
  - id: greenhouse_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [solar_heat_gain.value, greenhouse_heating_power.value]
      heat_out_variables: [greenhouse_transmission_loss.value, greenhouse_ventilation_heat_loss.value]
      residual_scale_W: 100.0
  - id: greenhouse_air_temperature_range
    type: RangeCheckModule
    parameters: {variable: greenhouse_air_temperature.value, lower_bound: 285.15, upper_bound: 305.15, residual_scale: 1.0, role: post_check}
  - id: greenhouse_co2_balance
    type: AggregateSpeciesBalanceModule
    parameters:
      species_in_variables: [co2_supply_molar_flow.value]
      species_out_variables: [co2_vent_loss_molar_flow.value]
      species_consumption_variables: [co2_plant_uptake_molar_flow.value]
      residual_scale_mol_s: 0.001
      species_name: CO2
  - id: greenhouse_co2_fraction_range
    type: RangeCheckModule
    parameters: {variable: greenhouse_co2_mol_fraction.value, lower_bound: 0.0003, upper_bound: 0.002, residual_scale: 0.0001, role: post_check}
  - id: fermentation_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [fermentation_substrate_feed_mass_flow.value]
      mass_out_variables: [fermentation_product_mass_flow.value, fermentation_offgas_mass_flow.value, fermentation_biomass_purge_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: fermentation_product_yield_check
    type: RatioModule
    parameters:
      numerator_variable: fermentation_product_mass_flow.value
      denominator_variable: fermentation_substrate_feed_mass_flow.value
      output_variable: fermentation_product_yield.value
      residual_scale: 0.001
  - id: fermentation_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [fermentation_heat_release.value]
      heat_out_variables: [fermentation_cooling_duty.value, fermentation_jacket_loss.value]
      residual_scale_W: 100.0
  - id: fermentation_reactor_temperature_range
    type: RangeCheckModule
    parameters: {variable: fermentation_reactor_temperature.value, lower_bound: 293.15, upper_bound: 313.15, residual_scale: 1.0, role: post_check}
  - id: dryer_product_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [wet_product_feed_mass_flow.value]
      mass_out_variables: [dry_product_mass_flow.value, dryer_water_evaporation_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: dryer_water_removal_check
    type: SumModule
    parameters:
      input_variables: [dryer_water_evaporation_mass_flow.value]
      output_variable: dryer_exhaust_water_mass_flow.value
      residual_scale: 0.01
  - id: dryer_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [dryer_heat_input.value]
      heat_out_variables: [dryer_product_heat_loss.value, dryer_exhaust_heat_loss.value]
      residual_scale_W: 100.0
  - id: dried_product_moisture_range
    type: RangeCheckModule
    parameters: {variable: dried_product_moisture_fraction.value, lower_bound: 0.0, upper_bound: 0.4, residual_scale: 0.01, role: post_check}
  - id: cold_chain_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [cold_room_cooling_capacity.value]
      heat_out_variables: [cold_room_product_heat_gain.value, cold_room_infiltration_heat_gain.value, cold_room_door_heat_gain.value]
      residual_scale_W: 100.0
  - id: cold_room_cop_check
    type: RatioModule
    parameters:
      numerator_variable: cold_room_cooling_capacity.value
      denominator_variable: cold_room_refrigeration_power.value
      output_variable: cold_room_cop.value
      residual_scale: 0.01
  - id: cold_room_temperature_range
    type: RangeCheckModule
    parameters: {variable: cold_room_temperature.value, lower_bound: 273.15, upper_bound: 283.15, residual_scale: 1.0, role: post_check}
  boundaries:
  - {variable: irrigation_supply_mass_flow.value, value: 10.0, scale: 1.0e-06}
  - {variable: crop_evapotranspiration_mass_flow.value, value: 6.5, scale: 1.0e-06}
  - {variable: drainage_return_mass_flow.value, value: 2.5, scale: 1.0e-09}
  - {variable: crop_water_storage_rate.value, value: 1.0, scale: 1.0e-09}
  - {variable: drainage_return_fraction.value, value: 0.25, scale: 1.0e-09}
  - {variable: root_zone_water_fraction.value, value: 0.4, scale: 1.0e-09}
  - {variable: solar_heat_gain.value, value: 50000.0, scale: 1.0e-06}
  - {variable: greenhouse_heating_power.value, value: 20000.0, scale: 1.0e-06}
  - {variable: greenhouse_transmission_loss.value, value: 45000.0, scale: 1.0e-06}
  - {variable: greenhouse_ventilation_heat_loss.value, value: 25000.0, scale: 1.0e-06}
  - {variable: greenhouse_air_temperature.value, value: 295.15, scale: 1.0e-06}
  - {variable: co2_supply_molar_flow.value, value: 2.0, scale: 1.0e-06}
  - {variable: co2_plant_uptake_molar_flow.value, value: 1.5, scale: 1.0e-06}
  - {variable: co2_vent_loss_molar_flow.value, value: 0.5, scale: 1.0e-09}
  - {variable: greenhouse_co2_mol_fraction.value, value: 0.001, scale: 1.0e-09}
  - {variable: fermentation_substrate_feed_mass_flow.value, value: 4.0, scale: 1.0e-06}
  - {variable: fermentation_product_mass_flow.value, value: 3.0, scale: 1.0e-06}
  - {variable: fermentation_offgas_mass_flow.value, value: 0.5, scale: 1.0e-09}
  - {variable: fermentation_biomass_purge_mass_flow.value, value: 0.5, scale: 1.0e-09}
  - {variable: fermentation_product_yield.value, value: 0.75, scale: 1.0e-09}
  - {variable: fermentation_heat_release.value, value: 25000.0, scale: 1.0e-06}
  - {variable: fermentation_cooling_duty.value, value: 22000.0, scale: 1.0e-06}
  - {variable: fermentation_jacket_loss.value, value: 3000.0, scale: 1.0e-06}
  - {variable: fermentation_reactor_temperature.value, value: 303.15, scale: 1.0e-06}
  - {variable: wet_product_feed_mass_flow.value, value: 5.0, scale: 1.0e-06}
  - {variable: dry_product_mass_flow.value, value: 4.0, scale: 1.0e-06}
  - {variable: dryer_water_evaporation_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: dryer_exhaust_water_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: dryer_heat_input.value, value: 60000.0, scale: 1.0e-06}
  - {variable: dryer_product_heat_loss.value, value: 45000.0, scale: 1.0e-06}
  - {variable: dryer_exhaust_heat_loss.value, value: 15000.0, scale: 1.0e-06}
  - {variable: dried_product_moisture_fraction.value, value: 0.125, scale: 1.0e-09}
  - {variable: cold_room_cooling_capacity.value, value: 30000.0, scale: 1.0e-06}
  - {variable: cold_room_product_heat_gain.value, value: 15000.0, scale: 1.0e-06}
  - {variable: cold_room_infiltration_heat_gain.value, value: 10000.0, scale: 1.0e-06}
  - {variable: cold_room_door_heat_gain.value, value: 5000.0, scale: 1.0e-06}
  - {variable: cold_room_temperature.value, value: 277.15, scale: 1.0e-06}
  - {variable: cold_room_refrigeration_power.value, value: 10000.0, scale: 1.0e-06}
  - {variable: cold_room_cop.value, value: 3.0, scale: 1.0e-09}
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: agriculture_food_bioprocess
    name: Agriculture, food, and bioprocess
    level: 0
    tags: [agriculture_food_bioprocess]
  - id: irrigation_crop_water
    name: Irrigation and crop water
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - irrigation_supply_mass_flow
    - crop_evapotranspiration_mass_flow
    - drainage_return_mass_flow
    - crop_water_storage_rate
    - drainage_return_fraction
    - root_zone_water_fraction
    - irrigation_water_balance
    - drainage_fraction_check
    - root_zone_water_range
    tags: [irrigation, drainage, crop_water]
    required_variables:
    - irrigation_supply_mass_flow.value
    - crop_evapotranspiration_mass_flow.value
    - drainage_return_mass_flow.value
    - crop_water_storage_rate.value
  - id: greenhouse_climate
    name: Greenhouse climate heat
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - solar_heat_gain
    - greenhouse_heating_power
    - greenhouse_transmission_loss
    - greenhouse_ventilation_heat_loss
    - greenhouse_air_temperature
    - greenhouse_heat_balance
    - greenhouse_air_temperature_range
    tags: [greenhouse, heat_balance, climate]
  - id: greenhouse_co2
    name: Greenhouse CO2 accounting
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - co2_supply_molar_flow
    - co2_plant_uptake_molar_flow
    - co2_vent_loss_molar_flow
    - greenhouse_co2_mol_fraction
    - greenhouse_co2_balance
    - greenhouse_co2_fraction_range
    tags: [greenhouse, co2, species_balance]
  - id: fermentation_bioreactor
    name: Fermentation bioreactor accounting
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - fermentation_substrate_feed_mass_flow
    - fermentation_product_mass_flow
    - fermentation_offgas_mass_flow
    - fermentation_biomass_purge_mass_flow
    - fermentation_product_yield
    - fermentation_heat_release
    - fermentation_cooling_duty
    - fermentation_jacket_loss
    - fermentation_reactor_temperature
    - fermentation_mass_balance
    - fermentation_product_yield_check
    - fermentation_heat_balance
    - fermentation_reactor_temperature_range
    tags: [fermentation, bioreactor, mass_balance, heat_balance]
  - id: drying_process
    name: Drying process
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - wet_product_feed_mass_flow
    - dry_product_mass_flow
    - dryer_water_evaporation_mass_flow
    - dryer_exhaust_water_mass_flow
    - dryer_heat_input
    - dryer_product_heat_loss
    - dryer_exhaust_heat_loss
    - dried_product_moisture_fraction
    - dryer_product_mass_balance
    - dryer_water_removal_check
    - dryer_heat_balance
    - dried_product_moisture_range
    tags: [drying, food_process, moisture, heat_balance]
  - id: cold_chain_storage
    name: Cold-chain storage
    level: 1
    parent_id: agriculture_food_bioprocess
    components:
    - cold_room_cooling_capacity
    - cold_room_product_heat_gain
    - cold_room_infiltration_heat_gain
    - cold_room_door_heat_gain
    - cold_room_temperature
    - cold_room_refrigeration_power
    - cold_room_cop
    - cold_chain_heat_balance
    - cold_room_cop_check
    - cold_room_temperature_range
    tags: [cold_chain, refrigeration, food_storage, cop]
  refinement_rules:
  - id: refine_irrigation_crop_water
    block_id: irrigation_crop_water
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids: [agriculture_food_bioprocess/level_2_irrigation_crop_water_placeholder]
    next_required_variables:
    - irrigation.supply_kg_s
    - irrigation.drainage_kg_s
    - crop.evapotranspiration_kg_s
    - root_zone.storage_rate_kg_s
    next_required_parameters:
    - irrigation_meter_grouping
    - drainage_boundary
    - evapotranspiration_basis
    rationale: Irrigation residual is high; inspect drainage, evapotranspiration, and storage mapping before adding soil-water or crop-growth detail.
    priority: 30
  - id: refine_greenhouse_climate
    block_id: greenhouse_climate
    trigger_diagnostic_keys:
    - aggregate_thermal_balance_mismatch
    - range_check_violation
    score_threshold: 1.0
