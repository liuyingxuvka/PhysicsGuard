metadata:
  template_level: 1
  domain: agriculture_food_bioprocess
  assumptions:
  - This template checks steady snapshot accounting only and does not implement crop-growth, photosynthesis, microbial kinetics, drying-rate, refrigeration-map, or detailed food-process models.
  - Irrigation, drainage, evapotranspiration, fermentation streams, wet/dry product streams, and dryer water removal are mapped as kg/s with caller-supplied boundaries.
  - Heat duties are positive watt magnitudes with explicit sign convention.
  - CO2 is checked as a coarse molar balance and does not infer biological uptake kinetics.
  - Range checks are post-check sanity diagnostics and do not define solved reference physics.
