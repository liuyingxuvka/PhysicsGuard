audit_name: manufacturing_thermal_process_conflict_missing_exhaust_loss
description: Level 0 manufacturing audit with intentionally missing exhaust heat loss.
system:
  system_name: manufacturing_thermal_process_conflict_missing_exhaust_loss
  components:
  - id: furnace_heat_input
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 1000000.0
      scale: 100000.0
      external_signal: mapped_furnace_heat_input
      mapping_confidence: template
  - id: product_heat_gain
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 700000.0
      scale: 70000.0
      external_signal: mapped_product_heat_gain
      mapping_confidence: template
  - id: exhaust_heat_loss
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 200000.0
      scale: 20000.0
      external_signal: mapped_exhaust_heat_loss
      mapping_confidence: template
  - id: wall_heat_loss
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 100000.0
      scale: 10000.0
      external_signal: mapped_wall_heat_loss
      mapping_confidence: template
  - id: furnace_heat_accounting_thermal_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables:
      - furnace_heat_input.value
      heat_out_variables:
      - product_heat_gain.value
      - exhaust_heat_loss.value
      - wall_heat_loss.value
      residual_scale_W: 100.0
  - id: line_electric_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 200000.0
      scale: 20000.0
      external_signal: mapped_line_electric_power
      mapping_confidence: template
  - id: machine_drive_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 150000.0
      scale: 15000.0
      external_signal: mapped_machine_drive_power
      mapping_confidence: template
  - id: line_auxiliary_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 50000.0
      scale: 5000.0
      external_signal: mapped_line_auxiliary_power
      mapping_confidence: template
  - id: line_drive_fraction
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: null
      lower_bound: 0.0
      upper_bound: 10.0
      initial_guess: 0.75
      scale: 1.0
      external_signal: mapped_line_drive_fraction
      mapping_confidence: template
  - id: production_line_power_power_balance
    type: AggregatePowerBalanceModule
    parameters:
      source_power_variables:
      - line_electric_power.value
      load_power_variables:
      - machine_drive_power.value
      - line_auxiliary_power.value
      residual_scale_W: 100.0
  - id: production_line_power_ratio_check
    type: RatioModule
    parameters:
      numerator_variable: machine_drive_power.value
      denominator_variable: line_electric_power.value
      output_variable: line_drive_fraction.value
      residual_scale: 0.01
  - id: raw_material_feed_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 50.0
      scale: 50.0
      external_signal: mapped_raw_material_feed_mass_flow
      mapping_confidence: template
  - id: finished_product_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 45.0
      scale: 45.0
      external_signal: mapped_finished_product_mass_flow
      mapping_confidence: template
  - id: scrap_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 5.0
      scale: 5.0
      external_signal: mapped_scrap_mass_flow
      mapping_confidence: template
  - id: material_yield_accounting_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables:
      - raw_material_feed_mass_flow.value
      mass_out_variables:
      - finished_product_mass_flow.value
      - scrap_mass_flow.value
      residual_scale_kg_s: 0.01
  boundaries:
  - variable: furnace_heat_input.value
    value: 1000000.0
    scale: 1.0e-06
  - variable: product_heat_gain.value
