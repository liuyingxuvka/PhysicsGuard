audit_name: industrial_utilities_level_1_steam_air_refrigeration_cooling_water
description: Level 1 industrial-utility audit for steam/condensate, compressed air, refrigeration, cooling water, and utility electrical power blocks.
system:
  system_name: industrial_utilities_level_1_steam_air_refrigeration_cooling_water
  components:
  - id: boiler_steam_generation_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 20.0, scale: 10.0, external_signal: mapped_boiler_steam_generation_mass_flow, mapping_confidence: template}
  - id: imported_steam_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 2.0, scale: 1.0, external_signal: mapped_imported_steam_mass_flow, mapping_confidence: template}
  - id: process_steam_demand_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 18.0, scale: 10.0, external_signal: mapped_process_steam_demand_mass_flow, mapping_confidence: template}
  - id: deaerator_steam_use_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 2.0, scale: 1.0, external_signal: mapped_deaerator_steam_use_mass_flow, mapping_confidence: template}
  - id: steam_vent_loss_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_steam_vent_loss_mass_flow, mapping_confidence: template}
  - id: exported_steam_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_exported_steam_mass_flow, mapping_confidence: template}
  - id: condensate_return_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 15.0, scale: 10.0, external_signal: mapped_condensate_return_mass_flow, mapping_confidence: template}
  - id: makeup_water_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 5.0, scale: 10.0, external_signal: mapped_makeup_water_mass_flow, mapping_confidence: template}
  - id: boiler_feedwater_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 20.0, scale: 10.0, external_signal: mapped_boiler_feedwater_mass_flow, mapping_confidence: template}
  - id: condensate_return_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.75, scale: 0.1, external_signal: mapped_condensate_return_fraction, mapping_confidence: template}
  - id: steam_header_pressure
    type: MappedSignalModule
    parameters: {local_name: value, unit: Pa, lower_bound: 10000.0, upper_bound: 50000000.0, initial_guess: 900000.0, scale: 100000.0, external_signal: mapped_steam_header_pressure, mapping_confidence: template}
  - id: compressor_air_output_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 5.0, scale: 1.0, external_signal: mapped_compressor_air_output_mass_flow, mapping_confidence: template}
  - id: production_air_use_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 4.125, scale: 1.0, external_signal: mapped_production_air_use_mass_flow, mapping_confidence: template}
  - id: instrument_air_use_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 0.25, scale: 0.1, external_signal: mapped_instrument_air_use_mass_flow, mapping_confidence: template}
  - id: air_leak_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 0.625, scale: 0.1, external_signal: mapped_air_leak_mass_flow, mapping_confidence: template}
  - id: air_leak_fraction
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.125, scale: 0.1, external_signal: mapped_air_leak_fraction, mapping_confidence: template}
  - id: compressed_air_header_pressure
    type: MappedSignalModule
    parameters: {local_name: value, unit: Pa, lower_bound: 10000.0, upper_bound: 5000000.0, initial_guess: 700000.0, scale: 100000.0, external_signal: mapped_compressed_air_header_pressure, mapping_confidence: template}
  - id: compressor_electric_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 100000.0, scale: 100000.0, external_signal: mapped_compressor_electric_power, mapping_confidence: template}
  - id: refrigeration_cooling_capacity
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 450000.0, scale: 100000.0, external_signal: mapped_refrigeration_cooling_capacity, mapping_confidence: template}
  - id: chilled_water_process_load
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 400000.0, scale: 100000.0, external_signal: mapped_chilled_water_process_load, mapping_confidence: template}
  - id: chilled_water_distribution_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 50000.0, scale: 10000.0, external_signal: mapped_chilled_water_distribution_loss, mapping_confidence: template}
  - id: chiller_electric_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 150000.0, scale: 100000.0, external_signal: mapped_chiller_electric_power, mapping_confidence: template}
  - id: chiller_cop
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 20.0, initial_guess: 3.0, scale: 1.0, external_signal: mapped_chiller_cop, mapping_confidence: template}
  - id: chilled_water_supply_temperature
    type: MappedSignalModule
    parameters: {local_name: value, unit: K, lower_bound: 250.0, upper_bound: 400.0, initial_guess: 279.15, scale: 10.0, external_signal: mapped_chilled_water_supply_temperature, mapping_confidence: template}
  - id: process_heat_to_cooling_water
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 600000.0, scale: 100000.0, external_signal: mapped_process_heat_to_cooling_water, mapping_confidence: template}
  - id: chiller_condenser_heat
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 600000.0, scale: 100000.0, external_signal: mapped_chiller_condenser_heat, mapping_confidence: template}
  - id: cooling_water_heat_rejection
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 1200000.0, scale: 100000.0, external_signal: mapped_cooling_water_heat_rejection, mapping_confidence: template}
  - id: cooling_water_makeup_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 2.0, scale: 1.0, external_signal: mapped_cooling_water_makeup_mass_flow, mapping_confidence: template}
  - id: cooling_water_evaporation_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.5, scale: 1.0, external_signal: mapped_cooling_water_evaporation_mass_flow, mapping_confidence: template}
  - id: cooling_water_blowdown_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 0.5, scale: 0.1, external_signal: mapped_cooling_water_blowdown_mass_flow, mapping_confidence: template}
  - id: cooling_water_pump_fan_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 30000.0, scale: 10000.0, external_signal: mapped_cooling_water_pump_fan_power, mapping_confidence: template}
  - id: utility_electric_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 300000.0, scale: 100000.0, external_signal: mapped_utility_electric_power, mapping_confidence: template}
  - id: boiler_auxiliary_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 20000.0, scale: 10000.0, external_signal: mapped_boiler_auxiliary_power, mapping_confidence: template}
  - id: steam_header_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [boiler_steam_generation_mass_flow.value, imported_steam_mass_flow.value]
      mass_out_variables: [process_steam_demand_mass_flow.value, deaerator_steam_use_mass_flow.value, steam_vent_loss_mass_flow.value, exported_steam_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: boiler_feedwater_makeup_check
    type: SumModule
    parameters:
      input_variables: [condensate_return_mass_flow.value, makeup_water_mass_flow.value]
      output_variable: boiler_feedwater_mass_flow.value
      residual_scale: 0.01
  - id: condensate_return_fraction_check
    type: RatioModule
    parameters:
      numerator_variable: condensate_return_mass_flow.value
      denominator_variable: boiler_feedwater_mass_flow.value
      output_variable: condensate_return_fraction.value
      residual_scale: 0.001
  - id: steam_header_pressure_range
    type: RangeCheckModule
    parameters: {variable: steam_header_pressure.value, lower_bound: 100000.0, upper_bound: 3000000.0, residual_scale: 10000.0, role: post_check}
  - id: compressed_air_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [compressor_air_output_mass_flow.value]
      mass_out_variables: [production_air_use_mass_flow.value, instrument_air_use_mass_flow.value, air_leak_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: air_leak_fraction_check
    type: RatioModule
    parameters:
      numerator_variable: air_leak_mass_flow.value
      denominator_variable: compressor_air_output_mass_flow.value
      output_variable: air_leak_fraction.value
      residual_scale: 0.001
  - id: compressed_air_header_pressure_range
    type: RangeCheckModule
    parameters: {variable: compressed_air_header_pressure.value, lower_bound: 300000.0, upper_bound: 1200000.0, residual_scale: 10000.0, role: post_check}
  - id: refrigeration_service_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [refrigeration_cooling_capacity.value]
      heat_out_variables: [chilled_water_process_load.value, chilled_water_distribution_loss.value]
      residual_scale_W: 100.0
  - id: chiller_cop_check
    type: RatioModule
    parameters:
      numerator_variable: refrigeration_cooling_capacity.value
      denominator_variable: chiller_electric_power.value
      output_variable: chiller_cop.value
      residual_scale: 0.01
  - id: chilled_water_supply_temperature_range
    type: RangeCheckModule
    parameters: {variable: chilled_water_supply_temperature.value, lower_bound: 273.15, upper_bound: 288.15, residual_scale: 1.0, role: post_check}
  - id: cooling_water_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [process_heat_to_cooling_water.value, chiller_condenser_heat.value]
      heat_out_variables: [cooling_water_heat_rejection.value]
      residual_scale_W: 100.0
  - id: cooling_water_makeup_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [cooling_water_makeup_mass_flow.value]
      mass_out_variables: [cooling_water_evaporation_mass_flow.value, cooling_water_blowdown_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: utility_electric_power_balance
    type: AggregatePowerBalanceModule
    parameters:
      source_power_variables: [utility_electric_power.value]
      load_power_variables: [compressor_electric_power.value, chiller_electric_power.value, cooling_water_pump_fan_power.value, boiler_auxiliary_power.value]
      residual_scale_W: 100.0
  boundaries:
  - {variable: boiler_steam_generation_mass_flow.value, value: 20.0, scale: 1.0e-06}
  - {variable: imported_steam_mass_flow.value, value: 2.0, scale: 1.0e-06}
  - {variable: process_steam_demand_mass_flow.value, value: 18.0, scale: 1.0e-06}
  - {variable: deaerator_steam_use_mass_flow.value, value: 2.0, scale: 1.0e-06}
  - {variable: steam_vent_loss_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: exported_steam_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: condensate_return_mass_flow.value, value: 15.0, scale: 1.0e-06}
  - {variable: makeup_water_mass_flow.value, value: 5.0, scale: 1.0e-06}
  - {variable: boiler_feedwater_mass_flow.value, value: 20.0, scale: 1.0e-06}
  - {variable: condensate_return_fraction.value, value: 0.75, scale: 1.0e-09}
  - {variable: steam_header_pressure.value, value: 900000.0, scale: 1.0e-06}
  - {variable: compressor_air_output_mass_flow.value, value: 5.0, scale: 1.0e-06}
  - {variable: production_air_use_mass_flow.value, value: 4.125, scale: 1.0e-06}
  - {variable: instrument_air_use_mass_flow.value, value: 0.25, scale: 1.0e-09}
  - {variable: air_leak_mass_flow.value, value: 0.625, scale: 1.0e-09}
  - {variable: air_leak_fraction.value, value: 0.125, scale: 1.0e-09}
  - {variable: compressed_air_header_pressure.value, value: 700000.0, scale: 1.0e-06}
  - {variable: compressor_electric_power.value, value: 100000.0, scale: 1.0e-06}
  - {variable: refrigeration_cooling_capacity.value, value: 450000.0, scale: 1.0e-06}
  - {variable: chilled_water_process_load.value, value: 400000.0, scale: 1.0e-06}
  - {variable: chilled_water_distribution_loss.value, value: 50000.0, scale: 1.0e-06}
  - {variable: chiller_electric_power.value, value: 150000.0, scale: 1.0e-06}
  - {variable: chiller_cop.value, value: 3.0, scale: 1.0e-09}
  - {variable: chilled_water_supply_temperature.value, value: 279.15, scale: 1.0e-06}
  - {variable: process_heat_to_cooling_water.value, value: 600000.0, scale: 1.0e-06}
  - {variable: chiller_condenser_heat.value, value: 600000.0, scale: 1.0e-06}
  - {variable: cooling_water_heat_rejection.value, value: 1200000.0, scale: 1.0e-06}
  - {variable: cooling_water_makeup_mass_flow.value, value: 2.0, scale: 1.0e-06}
  - {variable: cooling_water_evaporation_mass_flow.value, value: 1.5, scale: 1.0e-06}
  - {variable: cooling_water_blowdown_mass_flow.value, value: 0.5, scale: 1.0e-09}
  - {variable: cooling_water_pump_fan_power.value, value: 30000.0, scale: 1.0e-06}
  - {variable: utility_electric_power.value, value: 300000.0, scale: 1.0e-06}
  - {variable: boiler_auxiliary_power.value, value: 20000.0, scale: 1.0e-06}
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: industrial_utilities
    name: Industrial utility hub
    level: 0
    tags: [industrial_utilities]
  - id: steam_condensate
    name: Steam and condensate
    level: 1
    parent_id: industrial_utilities
    components:
    - boiler_steam_generation_mass_flow
    - imported_steam_mass_flow
    - process_steam_demand_mass_flow
    - deaerator_steam_use_mass_flow
    - steam_vent_loss_mass_flow
    - exported_steam_mass_flow
    - condensate_return_mass_flow
    - makeup_water_mass_flow
    - boiler_feedwater_mass_flow
    - condensate_return_fraction
    - steam_header_pressure
    - steam_header_mass_balance
    - boiler_feedwater_makeup_check
    - condensate_return_fraction_check
    - steam_header_pressure_range
    tags: [steam, condensate, boiler, feedwater]
    required_variables:
    - boiler_steam_generation_mass_flow.value
    - process_steam_demand_mass_flow.value
    - condensate_return_mass_flow.value
    - boiler_feedwater_mass_flow.value
  - id: compressed_air
    name: Compressed air
    level: 1
    parent_id: industrial_utilities
    components:
    - compressor_air_output_mass_flow
    - production_air_use_mass_flow
    - instrument_air_use_mass_flow
    - air_leak_mass_flow
    - air_leak_fraction
    - compressed_air_header_pressure
    - compressor_electric_power
    - compressed_air_mass_balance
    - air_leak_fraction_check
    - compressed_air_header_pressure_range
    tags: [compressed_air, leak, pressure]
  - id: refrigeration_chilled_water
    name: Refrigeration and chilled water
    level: 1
    parent_id: industrial_utilities
    components:
    - refrigeration_cooling_capacity
    - chilled_water_process_load
    - chilled_water_distribution_loss
    - chiller_electric_power
    - chiller_cop
    - chilled_water_supply_temperature
    - refrigeration_service_balance
    - chiller_cop_check
    - chilled_water_supply_temperature_range
    tags: [refrigeration, chilled_water, cop]
  - id: cooling_water
    name: Cooling water
    level: 1
    parent_id: industrial_utilities
    components:
    - process_heat_to_cooling_water
    - chiller_condenser_heat
    - cooling_water_heat_rejection
    - cooling_water_makeup_mass_flow
    - cooling_water_evaporation_mass_flow
    - cooling_water_blowdown_mass_flow
    - cooling_water_pump_fan_power
    - cooling_water_heat_balance
    - cooling_water_makeup_balance
    tags: [cooling_water, cooling_tower, heat_rejection, makeup]
  - id: utility_power
    name: Utility electrical power
    level: 1
    parent_id: industrial_utilities
    components:
    - utility_electric_power
    - boiler_auxiliary_power
    - utility_electric_power_balance
    tags: [utility_power, metering]
  refinement_rules:
  - id: refine_steam_condensate
    block_id: steam_condensate
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - ratio_relation_mismatch
    - sum_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids: [industrial_utilities/level_2_steam_condensate_placeholder]
    next_required_variables:
    - steam.header_pressure_Pa
    - steam.process_load_kg_s
    - condensate.return_kg_s
    - feedwater.makeup_kg_s
    next_required_parameters:
    - steam_metering_boundary
    - condensate_return_basis
    rationale: Steam/condensate residual is high; inspect meter grouping, return basis, vent/export mapping, and header pressure before adding boiler or steam-network detail.
    priority: 25
  - id: refine_compressed_air
    block_id: compressed_air
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids: [industrial_utilities/level_2_compressed_air_placeholder]
    next_required_variables:
    - air.compressor_output_kg_s
    - air.production_use_kg_s
    - air.leak_kg_s
    - air.header_pressure_Pa
    next_required_parameters:
    - air_leak_boundary
    - compressor_meter_grouping
    rationale: Compressed-air residual is high; inspect demand grouping, leak boundary, and pressure mapping before adding compressor maps.
    priority: 20
  - id: refine_refrigeration_chilled_water
    block_id: refrigeration_chilled_water
    trigger_diagnostic_keys:
    - aggregate_thermal_balance_mismatch
    - ratio_relation_mismatch
    - range_check_violation
    score_threshold: 1.0
    next_template_ids: [industrial_utilities/level_2_refrigeration_placeholder]
    next_required_variables:
    - refrigeration.cooling_capacity_W
    - chilled_water.load_W
    - chiller.electric_power_W
    - chilled_water.supply_temperature_K
    next_required_parameters:
    - cooling_duty_sign_convention
    - chiller_power_meter_grouping
    rationale: Refrigeration residual is high; inspect cooling-duty sign, chilled-water load basis, and COP meter grouping before adding chiller maps.
    priority: 15
  - id: refine_cooling_water
    block_id: cooling_water
    trigger_diagnostic_keys:
    - aggregate_thermal_balance_mismatch
    - aggregate_mass_balance_mismatch
    score_threshold: 1.0
    next_template_ids: [industrial_utilities/level_2_cooling_water_placeholder]
    next_required_variables:
    - cooling_water.heat_rejection_W
    - cooling_water.makeup_kg_s
    - cooling_water.evaporation_kg_s
    - cooling_water.blowdown_kg_s
    next_required_parameters:
    - heat_rejection_boundary
    - makeup_blowdown_basis
    rationale: Cooling-water residual is high; inspect heat-rejection boundary and makeup/blowdown accounting before adding tower performance detail.
    priority: 10
  - id: refine_utility_power
    block_id: utility_power
    trigger_diagnostic_keys: [aggregate_power_balance_mismatch]
    score_threshold: 1.0
    next_template_ids: [industrial_utilities/level_2_utility_power_placeholder]
    next_required_variables:
    - utilities.total_power_W
    - compressor.power_W
    - chiller.power_W
    - cooling_water.pump_fan_power_W
    - boiler.aux_power_W
    next_required_parameters:
    - utility_meter_grouping
    rationale: Utility-power residual is high; inspect meter grouping before adding equipment performance models or optimization.
    priority: 5
  scoring:
    method: max
metadata:
  template_level: 1
  domain: industrial_utilities
  assumptions:
  - This template checks steady snapshot accounting only and does not implement plant-wide optimization, boiler maps, compressor maps, chiller maps, cooling-tower performance, or steam-network hydraulics.
  - Steam, condensate, cooling-water makeup, and compressed-air flows are mapped as kg/s with caller-supplied metering boundaries.
  - Thermal duties are positive watt magnitudes with explicit sign convention.
  - Range checks are post-check sanity diagnostics and do not define solved reference physics.
