audit_name: water_supply_network_level_0
description: Level 0 coarse water-supply audit for treatment outflow, distribution
  leakage, storage, and pump power.
system:
  system_name: water_supply_network_level_0
  components:
  - id: treatment_outflow_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 100.0
      scale: 100.0
      external_signal: mapped_treatment_outflow_mass_flow
      mapping_confidence: template
  - id: customer_demand_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 90.0
      scale: 90.0
      external_signal: mapped_customer_demand_mass_flow
      mapping_confidence: template
  - id: distribution_leakage_mass_flow
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 5.0
      scale: 5.0
      external_signal: mapped_distribution_leakage_mass_flow
      mapping_confidence: template
  - id: reservoir_storage_rate
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: kg/s
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 5.0
      scale: 5.0
      external_signal: mapped_reservoir_storage_rate
      mapping_confidence: template
  - id: distribution_water_accounting_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables:
      - treatment_outflow_mass_flow.value
      mass_out_variables:
      - customer_demand_mass_flow.value
      - distribution_leakage_mass_flow.value
      - reservoir_storage_rate.value
      residual_scale_kg_s: 0.01
  - id: pump_electric_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 100000.0
      scale: 10000.0
      external_signal: mapped_pump_electric_power
      mapping_confidence: template
  - id: delivered_hydraulic_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 80000.0
      scale: 8000.0
      external_signal: mapped_delivered_hydraulic_power
      mapping_confidence: template
  - id: pump_loss_power
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: W
      lower_bound: 0.0
      upper_bound: 1000000000000.0
      initial_guess: 20000.0
      scale: 2000.0
      external_signal: mapped_pump_loss_power
      mapping_confidence: template
  - id: pump_station_efficiency
    type: MappedSignalModule
    parameters:
      local_name: value
      unit: null
      lower_bound: 0.0
      upper_bound: 10.0
      initial_guess: 0.8
      scale: 1.0
      external_signal: mapped_pump_station_efficiency
      mapping_confidence: template
  - id: pump_station_power_power_balance
    type: AggregatePowerBalanceModule
    parameters:
      source_power_variables:
      - pump_electric_power.value
      load_power_variables:
      - delivered_hydraulic_power.value
      - pump_loss_power.value
      residual_scale_W: 100.0
  - id: pump_station_power_ratio_check
    type: RatioModule
    parameters:
      numerator_variable: delivered_hydraulic_power.value
      denominator_variable: pump_electric_power.value
      output_variable: pump_station_efficiency.value
      residual_scale: 0.01
  - id: pump_station_efficiency_range
    type: RangeCheckModule
    parameters:
      variable: pump_station_efficiency.value
      lower_bound: 0.0
      upper_bound: 1.0
      residual_scale: 0.01
      role: post_check
  boundaries:
  - variable: treatment_outflow_mass_flow.value
    value: 100.0
    scale: 1.0e-06
  - variable: customer_demand_mass_flow.value
    value: 90.0
    scale: 1.0e-06
  - variable: distribution_leakage_mass_flow.value
    value: 5.0
    scale: 1.0e-06
  - variable: reservoir_storage_rate.value
    value: 5.0
    scale: 1.0e-06
  - variable: pump_electric_power.value
    value: 100000.0
    scale: 1.0e-06
  - variable: delivered_hydraulic_power.value
    value: 80000.0
    scale: 1.0e-06
  - variable: pump_loss_power.value
    value: 20000.0
    scale: 1.0e-06
  - variable: pump_station_efficiency.value
    value: 0.8
    scale: 1.0e-09
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: water_supply_network
    name: Water supply network
    level: 0
    components:
    - treatment_outflow_mass_flow
    - customer_demand_mass_flow
    - distribution_leakage_mass_flow
    - reservoir_storage_rate
    - distribution_water_accounting_mass_balance
    - pump_electric_power
    - delivered_hydraulic_power
    - pump_loss_power
    - pump_station_efficiency
    - pump_station_power_power_balance
    - pump_station_power_ratio_check
    - pump_station_efficiency_range
    tags:
    - water_supply_network
    - level_0
    - water_supply
    - pump
    - distribution
    required_variables:
    - treatment_outflow_mass_flow.value
    refinement_template_ids:
    - water_supply_network/level_1_source_pump_distribution_storage
  refinement_rules:
  - id: refine_water_supply_network_level_0
    block_id: water_supply_network
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - aggregate_power_balance_mismatch
    - range_check_violation
    - ratio_relation_mismatch
    score_threshold: 1.0
    next_template_ids:
    - water_supply_network/level_1_source_pump_distribution_storage
    next_required_variables:
    - plant.outflow_kg_s
    - customer.demand_kg_s
    - network.leakage_kg_s
    - pump.power_W
    next_required_parameters:
    - district_meter_boundary
    - leakage_boundary
    - pump_meter_grouping
    rationale: Coarse water-supply residual is high; refine source, pump, distribution,
      and storage checks before adding network hydraulics.
    priority: 10
  scoring:
    method: max
metadata:
  template_level: 0
  domain: water_supply_network
  assumptions:
  - Water flows are mapped as kg/s; no EPANET-style hydraulics, pressure-zone simulation,
    or pump curves are inferred.
  - This template is a steady snapshot low-fidelity audit over mapped SI signals.
  - All assumptions, sign conventions, and metering boundaries must be explicit before
    interpreting residuals.
  - No high-fidelity simulator, calibrated performance map, or commercial-tool-equivalent
    behavior is implemented.
