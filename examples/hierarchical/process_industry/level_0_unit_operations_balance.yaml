audit_name: process_industry_level_0_unit_operations_balance
description: Level 0 coarse process-industry audit for plant mass, species conversion, heat duty, and utility power accounting.
system:
  system_name: process_industry_level_0_unit_operations_balance
  components:
  - id: feed_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 10.0, scale: 10.0, external_signal: mapped_feed_mass_flow, mapping_confidence: template}
  - id: product_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 8.0, scale: 10.0, external_signal: mapped_product_mass_flow, mapping_confidence: template}
  - id: purge_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_purge_mass_flow, mapping_confidence: template}
  - id: waste_mass_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: kg/s, lower_bound: 0.0, upper_bound: 1000000.0, initial_guess: 1.0, scale: 1.0, external_signal: mapped_waste_mass_flow, mapping_confidence: template}
  - id: feed_A_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 100.0, scale: 100.0, external_signal: mapped_feed_A_molar_flow, mapping_confidence: template}
  - id: unreacted_A_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 20.0, scale: 10.0, external_signal: mapped_unreacted_A_molar_flow, mapping_confidence: template}
  - id: reacted_A_molar_flow
    type: MappedSignalModule
    parameters: {local_name: value, unit: mol/s, lower_bound: 0.0, upper_bound: 100000000.0, initial_guess: 80.0, scale: 100.0, external_signal: mapped_reacted_A_molar_flow, mapping_confidence: template}
  - id: conversion_A
    type: MappedSignalModule
    parameters: {local_name: value, unit: null, lower_bound: 0.0, upper_bound: 1.0, initial_guess: 0.8, scale: 0.1, external_signal: mapped_conversion_A, mapping_confidence: template}
  - id: reactor_heat_release
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 50000.0, scale: 10000.0, external_signal: mapped_reactor_heat_release, mapping_confidence: template}
  - id: cooling_duty
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 45000.0, scale: 10000.0, external_signal: mapped_cooling_duty, mapping_confidence: template}
  - id: ambient_heat_loss
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 5000.0, scale: 1000.0, external_signal: mapped_ambient_heat_loss, mapping_confidence: template}
  - id: utility_electric_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 15000.0, scale: 10000.0, external_signal: mapped_utility_electric_power, mapping_confidence: template}
  - id: pump_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 4000.0, scale: 1000.0, external_signal: mapped_pump_power, mapping_confidence: template}
  - id: compressor_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 9000.0, scale: 1000.0, external_signal: mapped_compressor_power, mapping_confidence: template}
  - id: agitator_power
    type: MappedSignalModule
    parameters: {local_name: value, unit: W, lower_bound: 0.0, upper_bound: 1000000000.0, initial_guess: 2000.0, scale: 1000.0, external_signal: mapped_agitator_power, mapping_confidence: template}
  - id: plant_mass_balance
    type: AggregateMassBalanceModule
    parameters:
      mass_in_variables: [feed_mass_flow.value]
      mass_out_variables: [product_mass_flow.value, purge_mass_flow.value, waste_mass_flow.value]
      residual_scale_kg_s: 0.01
  - id: reactant_A_balance
    type: AggregateSpeciesBalanceModule
    parameters:
      species_in_variables: [feed_A_molar_flow.value]
      species_out_variables: [unreacted_A_molar_flow.value]
      species_consumption_variables: [reacted_A_molar_flow.value]
      residual_scale_mol_s: 0.1
      species_name: A
  - id: conversion_A_check
    type: RatioModule
    parameters:
      numerator_variable: reacted_A_molar_flow.value
      denominator_variable: feed_A_molar_flow.value
      output_variable: conversion_A.value
      residual_scale: 0.001
  - id: process_heat_balance
    type: AggregateThermalBalanceModule
    parameters:
      heat_in_variables: [reactor_heat_release.value]
      heat_out_variables: [cooling_duty.value, ambient_heat_loss.value]
      residual_scale_W: 100.0
  - id: process_utility_power_balance
    type: AggregatePowerBalanceModule
    parameters:
      source_power_variables: [utility_electric_power.value]
      load_power_variables: [pump_power.value, compressor_power.value, agitator_power.value]
      residual_scale_W: 100.0
  boundaries:
  - {variable: feed_mass_flow.value, value: 10.0, scale: 1.0e-06}
  - {variable: product_mass_flow.value, value: 8.0, scale: 1.0e-06}
  - {variable: purge_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: waste_mass_flow.value, value: 1.0, scale: 1.0e-06}
  - {variable: feed_A_molar_flow.value, value: 100.0, scale: 1.0e-06}
  - {variable: unreacted_A_molar_flow.value, value: 20.0, scale: 1.0e-06}
  - {variable: reacted_A_molar_flow.value, value: 80.0, scale: 1.0e-06}
  - {variable: conversion_A.value, value: 0.8, scale: 1.0e-09}
  - {variable: reactor_heat_release.value, value: 50000.0, scale: 1.0e-06}
  - {variable: cooling_duty.value, value: 45000.0, scale: 1.0e-06}
  - {variable: ambient_heat_loss.value, value: 5000.0, scale: 1.0e-06}
  - {variable: utility_electric_power.value, value: 15000.0, scale: 1.0e-06}
  - {variable: pump_power.value, value: 4000.0, scale: 1.0e-06}
  - {variable: compressor_power.value, value: 9000.0, scale: 1.0e-06}
  - {variable: agitator_power.value, value: 2000.0, scale: 1.0e-06}
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: process_industry
    name: Process-industry unit operations
    level: 0
    components:
    - feed_mass_flow
    - product_mass_flow
    - purge_mass_flow
    - waste_mass_flow
    - feed_A_molar_flow
    - unreacted_A_molar_flow
    - reacted_A_molar_flow
    - conversion_A
    - reactor_heat_release
    - cooling_duty
    - ambient_heat_loss
    - utility_electric_power
    - pump_power
    - compressor_power
    - agitator_power
    - plant_mass_balance
    - reactant_A_balance
    - conversion_A_check
    - process_heat_balance
    - process_utility_power_balance
    tags: [process_industry, level_0, mass_balance, conversion, heat_duty, utility_power]
    required_variables:
    - feed_mass_flow.value
    - product_mass_flow.value
    - feed_A_molar_flow.value
    - conversion_A.value
    - reactor_heat_release.value
    - cooling_duty.value
    refinement_template_ids:
    - process_industry/level_1_reactor_separator_utility
  refinement_rules:
  - id: refine_process_industry_level_0
    block_id: process_industry
    trigger_diagnostic_keys:
    - aggregate_mass_balance_mismatch
    - aggregate_species_balance_mismatch
    - ratio_relation_mismatch
    - aggregate_thermal_balance_mismatch
    - aggregate_power_balance_mismatch
    score_threshold: 1.0
    next_template_ids:
    - process_industry/level_1_reactor_separator_utility
    next_required_variables:
    - reactor.feed_A_mol_s
    - reactor.unreacted_A_mol_s
    - separator.product_mass_kg_s
    - exchanger.cooling_duty_W
    - rotating.pump_power_W
    next_required_parameters:
    - reactor.conversion_basis
    - separator.split_basis
    - utility.heat_duty_sign_convention
    rationale: Coarse process residual is high; refine into reactor conversion, separator split, heat-exchange utility, and rotating equipment checks before adding detailed unit-operation physics.
    priority: 10
  scoring:
    method: max
metadata:
  template_level: 0
  domain: process_industry
  assumptions:
  - This is a steady snapshot accounting audit over mapped SI signals, not a process simulator.
  - Conversion is checked as reacted A molar flow divided by feed A molar flow.
  - Heat duty is mapped as positive watt magnitudes with explicit release, cooling, and loss roles.
  - Utility power is an aggregate accounting check and does not infer pump or compressor curves.
