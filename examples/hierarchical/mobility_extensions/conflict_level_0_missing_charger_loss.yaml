metadata:
  template_level: 0
  domain: mobility_extensions
  assumptions:
  - This conflict intentionally maps charger loss to zero to represent an omitted charging loss term.
  - This is a steady snapshot power-accounting audit over mapped SI signals, not a vehicle, train, ship, aircraft, charging-network, or hydraulic-system simulator.
  - Fuel-energy, grid, traction, propulsive, auxiliary, waste-heat, and hydraulic powers are positive watt magnitudes with caller-supplied boundaries.
