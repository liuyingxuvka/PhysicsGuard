# PhysicsGuard hierarchical audit/model blueprint
# Purpose: Level 1 fuel-cell major subsystem audit.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli hierarchy run examples/hierarchical/fuel_cell_system/conflict_level_1_cathode_air_path.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
audit_name: fuel_cell_conflict_level_1_cathode_air_path
description: Level 1 fuel-cell major subsystem audit.
system:
  system_name: fuel_cell_conflict_level_1_cathode_air_path
  components:
  - id: stack
    type: FuelCellStackBalanceModule
    parameters:
      n_cells: 400.0
  - id: cathode
    type: FuelCellCathodeAirSupplyModule
    parameters:
      n_cells: 400.0
  - id: anode
    type: FuelCellAnodeHydrogenSupplyModule
    parameters:
      n_cells: 400.0
  - id: cool
    type: FuelCellCoolantInterfaceModule
    parameters: {}
  - id: net_power
    type: DummyResidualModule
    parameters:
      target: 23000.0
      lower_bound: -1000000000.0
      upper_bound: 1000000000.0
      initial_guess: 23000.0
      scale: 23000.0
      unit: W
  - id: aux_power
    type: DummyResidualModule
    parameters:
      target: 5000.0
      lower_bound: -1000000000.0
      upper_bound: 1000000000.0
      initial_guess: 5000.0
      scale: 5000.0
      unit: W
  - id: hv_bus
    type: AggregateElectricalBusBalanceModule
    parameters:
      generation_power_variables:
      - stack.P_stack_W
      consumption_power_variables:
      - net_power.x
      - aux_power.x
      residual_scale_W: 1000.0
  - id: ctrl
    type: ControlErrorModule
    parameters: {}
  boundaries:
  - variable: stack.current_A
    value: 100.0
    scale: 1.0e-06
  - variable: stack.V_cell_V
    value: 0.7
    scale: 1.0e-06
  - variable: cathode.current_A
    value: 100.0
    scale: 1.0e-06
  - variable: cathode.n_dot_O2_consumed_mol_s
    value: 0.1036423
    scale: 1.0e-06
  - variable: cathode.oxygen_stoichiometry
    value: 2.0
    scale: 1.0e-06
  - variable: cathode.n_dot_air_feed_mol_s
    value: 0.1
    scale: 1.0e-06
  - variable: cathode.m_dot_air_feed_kg_s
    value: 0.0285882
    scale: 1.0e-06
  - variable: anode.current_A
    value: 100.0
    scale: 1.0e-06
  - variable: anode.n_dot_H2_consumed_mol_s
    value: 0.2072846
    scale: 1.0e-06
  - variable: anode.hydrogen_stoichiometry
    value: 1.5
    scale: 1.0e-06
  - variable: anode.n_dot_H2_feed_mol_s
    value: 0.3109269
    scale: 1.0e-06
  - variable: anode.m_dot_H2_feed_kg_s
    value: 0.0006268
    scale: 1.0e-06
  - variable: cool.Q_stack_heat_W
    value: 4180.0
    scale: 1.0e-06
  - variable: cool.m_dot_coolant_kg_s
    value: 0.1
    scale: 1.0e-06
  - variable: cool.T_coolant_in_K
    value: 300.0
    scale: 1.0e-06
  - variable: cool.T_coolant_out_K
    value: 310.0
    scale: 1.0e-06
  - variable: net_power.x
    value: 23000.0
    scale: 1.0e-06
  - variable: aux_power.x
    value: 5000.0
    scale: 1.0e-06
  - variable: ctrl.setpoint
    value: 1.0
    scale: 1.0e-06
  - variable: ctrl.measurement
    value: 1.0
    scale: 1.0e-06
  - variable: ctrl.error
    value: 0.0
    scale: 1.0e-06
  solver:
    tolerance: 1.0e-08
    audit_threshold: 1.0
hierarchy:
  blocks:
  - id: fc_system
    name: Fuel-cell system
    level: 0
    tags:
    - fuel_cell
  - id: stack
    name: Stack
    level: 1
    parent_id: fc_system
    components:
    - stack
    required_variables:
    - stack.current_A
    - stack.V_cell_V
    - stack.P_stack_W
  - id: cathode_air_path
    name: Cathode air path
    level: 1
    parent_id: fc_system
    components:
    - cathode
    required_variables:
    - cathode.current_A
    - cathode.n_dot_air_feed_mol_s
    refinement_template_ids:
    - fuel_cell_system/level_2_cathode_air_path
  - id: anode_hydrogen_path
    name: Anode hydrogen path
    level: 1
    parent_id: fc_system
    components:
    - anode
  - id: coolant_loop
    name: Coolant loop
    level: 1
    parent_id: fc_system
    components:
    - cool
    refinement_template_ids:
    - fuel_cell_system/level_2_cooling_loop
  - id: hv_system
    name: HV system
    level: 1
    parent_id: fc_system
    components:
    - net_power
    - aux_power
    - hv_bus
  - id: controls
    name: Controls
    level: 1
    parent_id: fc_system
    components:
    - ctrl
  refinement_rules:
  - id: refine_cathode_path
    block_id: cathode_air_path
    trigger_diagnostic_keys:
    - fc_cathode_air_molar_feed_mismatch
    - fc_cathode_air_mass_feed_mismatch
    score_threshold: 1.0
    next_template_ids:
    - fuel_cell_system/level_2_cathode_air_path
    next_required_variables:
    - comp.pressure_ratio
    - hum.humidity_ratio_out_kg_kg
    - valve.m_dot_kg_s
    rationale: Cathode air feed residual is high; refine compressor, intercooler,
      humidifier, and exhaust valve.
    priority: 20
  - id: refine_cooling_loop
    block_id: coolant_loop
    trigger_diagnostic_keys:
    - fc_coolant_heat_interface_mismatch
    score_threshold: 1.0
    next_template_ids:
    - fuel_cell_system/level_2_cooling_loop
    priority: 10
  scoring:
    method: max
