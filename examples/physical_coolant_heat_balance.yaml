# PhysicsGuard system audit/model blueprint
# Purpose: Low-fidelity coolant heat balance audit example.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/physical_coolant_heat_balance.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: physical_coolant_heat_balance
description: Low-fidelity coolant heat balance audit example.
components:
  - id: coolant
    type: CoolantHeatBalanceModule
    parameters:
      cp_J_kgK: 4180.0
      residual_scale_W: 1000.0
      Q_dot_initial_guess: 3000.0
boundaries:
  - variable: coolant.m_dot_kg_s
    value: 0.1
    unit: kg/s
  - variable: coolant.T_in_K
    value: 300.0
    unit: K
  - variable: coolant.T_out_K
    value: 310.0
    unit: K
solver:
  method: least_squares
  max_iterations: 30
  tolerance: 1.0e-8
  audit_threshold: 1.0
