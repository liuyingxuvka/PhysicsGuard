# PhysicsGuard observed-values snapshot
# Purpose: Observed coolant values consistent with the low-fidelity heat balance.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: pair with an audit YAML via python -m physicsguard.cli evaluate or hierarchy evaluate
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
observation_name: physical_coolant_observed_clean
description: Observed coolant values consistent with the low-fidelity heat balance.
variables:
  coolant.m_dot_kg_s:
    value: 0.1
    unit: kg/s
    source: example
  coolant.T_in_K:
    value: 300.0
    unit: K
    source: example
  coolant.T_out_K:
    value: 310.0
    unit: K
    source: example
  coolant.Q_dot_W:
    value: 4180.0
    unit: W
    source: example
metadata:
  example_type: observed_clean
