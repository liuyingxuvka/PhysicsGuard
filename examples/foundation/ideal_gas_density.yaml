# PhysicsGuard system audit/model blueprint
# Purpose: foundation ideal gas density.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/ideal_gas_density.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_ideal_gas_density
components:
  - id: gas
    type: IdealGasDensityModule
    parameters:
      molar_mass_kg_mol: 0.0289652
boundaries:
  - variable: gas.p_Pa
    value: 101325.0
    unit: Pa
  - variable: gas.T_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
