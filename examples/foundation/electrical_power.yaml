# PhysicsGuard system audit/model blueprint
# Purpose: foundation electrical power.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/electrical_power.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_electrical_power
components:
  - id: elec
    type: ElectricalPowerModule
    parameters:
      P_initial_guess: 4000.0
boundaries:
  - variable: elec.V_V
    value: 400.0
    unit: V
  - variable: elec.current_A
    value: 10.0
    unit: A
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
