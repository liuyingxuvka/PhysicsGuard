# PhysicsGuard system audit/model blueprint
# Purpose: foundation linear spring force.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/linear_spring_force.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_linear_spring_force
components:
  - id: spring
    type: LinearSpringForceModule
    parameters:
      stiffness_N_m: 1000.0
boundaries:
  - variable: spring.displacement_m
    value: 0.01
    unit: m
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
