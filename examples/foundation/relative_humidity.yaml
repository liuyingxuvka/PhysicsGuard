# PhysicsGuard system audit/model blueprint
# Purpose: foundation relative humidity.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/relative_humidity.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_relative_humidity
components:
  - id: rh
    type: RelativeHumidityFromPartialPressureModule
    parameters: {}
boundaries:
  - variable: rh.p_vapor_Pa
    value: 1000.0
    unit: Pa
  - variable: rh.p_saturation_Pa
    value: 2000.0
    unit: Pa
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
