# PhysicsGuard system audit/model blueprint
# Purpose: foundation mass molar flow conversion.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/mass_molar_flow_conversion.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_mass_molar_flow_conversion
components:
  - id: conv
    type: MassMolarFlowConversionModule
    parameters:
      molar_mass_kg_mol: 0.002
boundaries:
  - variable: conv.n_dot_mol_s
    value: 2.0
    unit: mol/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
