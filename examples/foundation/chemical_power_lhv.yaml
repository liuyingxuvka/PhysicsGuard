# PhysicsGuard system audit/model blueprint
# Purpose: foundation chemical power lhv.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/chemical_power_lhv.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_chemical_power_lhv
components:
  - id: chem
    type: ChemicalPowerLHVModule
    parameters:
      LHV_J_kg: 120000000.0
boundaries:
  - variable: chem.m_dot_fuel_kg_s
    value: 0.001
    unit: kg/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
