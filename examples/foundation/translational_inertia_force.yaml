# PhysicsGuard system audit/model blueprint
# Purpose: foundation translational inertia force.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/translational_inertia_force.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_translational_inertia_force
components:
  - id: inertia
    type: TranslationalInertiaForceModule
    parameters:
      mass_kg: 10.0
boundaries:
  - variable: inertia.acceleration_m_s2
    value: 3.0
    unit: m/s^2
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
