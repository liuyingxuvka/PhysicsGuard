# PhysicsGuard system audit/model blueprint
# Purpose: foundation convection.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/convection.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_convection
components:
  - id: conv
    type: ConvectiveHeatTransferModule
    parameters:
      h_W_m2K: 100.0
      area_m2: 0.5
boundaries:
  - variable: conv.T_surface_K
    value: 330.0
    unit: K
  - variable: conv.T_fluid_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
