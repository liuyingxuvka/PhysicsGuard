# PhysicsGuard system audit/model blueprint
# Purpose: foundation humidity ratio.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/humidity_ratio.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_humidity_ratio
components:
  - id: hr
    type: HumidityRatioFromPartialPressureModule
    parameters: {}
boundaries:
  - variable: hr.p_total_Pa
    value: 101325.0
    unit: Pa
  - variable: hr.p_vapor_Pa
    value: 2000.0
    unit: Pa
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
