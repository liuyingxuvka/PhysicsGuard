# PhysicsGuard system audit/model blueprint
# Purpose: foundation mass balance rate.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/mass_balance_rate.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_mass_balance_rate
components:
  - id: inlet
    type: DummyResidualModule
    parameters:
      target: 1.0
  - id: outlet
    type: DummyResidualModule
    parameters:
      target: 1.0
  - id: balance
    type: MassBalanceRateModule
    parameters:
      input_variables: [inlet.x]
      output_variables: [outlet.x]
      residual_scale_kg_s: 0.01
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
