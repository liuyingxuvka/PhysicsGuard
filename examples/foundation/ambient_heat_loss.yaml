# PhysicsGuard system audit/model blueprint
# Purpose: foundation ambient heat loss.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/ambient_heat_loss.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_ambient_heat_loss
components:
  - id: loss
    type: AmbientHeatLossModule
    parameters:
      UA_W_K: 100.0
boundaries:
  - variable: loss.T_body_K
    value: 330.0
    unit: K
  - variable: loss.T_ambient_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
