# PhysicsGuard system audit/model blueprint
# Purpose: foundation viscous damper force.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/viscous_damper_force.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_viscous_damper_force
components:
  - id: damper
    type: ViscousDamperForceModule
    parameters:
      damping_N_s_m: 50.0
boundaries:
  - variable: damper.velocity_m_s
    value: 2.0
    unit: m/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
