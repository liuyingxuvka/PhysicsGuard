# PhysicsGuard system audit/model blueprint
# Purpose: foundation volumetric mass flow conversion.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/volumetric_mass_flow_conversion.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_volumetric_mass_flow_conversion
components:
  - id: flow
    type: VolumetricMassFlowConversionModule
    parameters:
      rho_kg_m3: 1000.0
boundaries:
  - variable: flow.V_dot_m3_s
    value: 0.01
    unit: m^3/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
