# PhysicsGuard system audit/model blueprint
# Purpose: foundation isentropic gas temperature rise.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/isentropic_gas_temperature_rise.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_isentropic_gas_temperature_rise
components:
  - id: rise
    type: IsentropicGasTemperatureRiseModule
    parameters:
      gamma: 1.4
      efficiency: 0.7
boundaries:
  - variable: rise.p_in_Pa
    value: 100000.0
    unit: Pa
  - variable: rise.p_out_Pa
    value: 200000.0
    unit: Pa
  - variable: rise.T_in_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
