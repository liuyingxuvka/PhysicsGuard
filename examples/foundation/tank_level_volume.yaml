# PhysicsGuard system audit/model blueprint
# Purpose: foundation tank level volume.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/tank_level_volume.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_tank_level_volume
components:
  - id: tank
    type: TankLevelVolumeModule
    parameters:
      area_m2: 3.0
boundaries:
  - variable: tank.level_m
    value: 2.0
    unit: m
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
