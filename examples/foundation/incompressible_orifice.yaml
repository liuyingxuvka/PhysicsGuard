# PhysicsGuard system audit/model blueprint
# Purpose: foundation incompressible orifice.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/incompressible_orifice.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_incompressible_orifice
components:
  - id: orifice
    type: IncompressibleOrificeModule
    parameters:
      CdA_m2: 0.001
      rho_kg_m3: 1000.0
      residual_scale_kg2_s2: 0.1
      m_dot_initial_guess: 3.16227766
boundaries:
  - variable: orifice.p_upstream_Pa
    value: 105000.0
    unit: Pa
  - variable: orifice.p_downstream_Pa
    value: 100000.0
    unit: Pa
solver:
  max_iterations: 100
  tolerance: 1.0e-6
  audit_threshold: 1.0
