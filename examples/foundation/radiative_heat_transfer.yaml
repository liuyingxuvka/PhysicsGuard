# PhysicsGuard system audit/model blueprint
# Purpose: foundation radiative heat transfer.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/radiative_heat_transfer.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_radiative_heat_transfer
components:
  - id: rad
    type: RadiativeHeatTransferModule
    parameters:
      emissivity: 1.0
      area_m2: 1.0
boundaries:
  - variable: rad.T_hot_K
    value: 400.0
    unit: K
  - variable: rad.T_cold_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
