# PhysicsGuard system audit/model blueprint
# Purpose: foundation ohmic relation.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/ohmic_relation.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_ohmic_relation
components:
  - id: resistor
    type: OhmicRelationModule
    parameters:
      resistance_ohm: 0.1
boundaries:
  - variable: resistor.current_A
    value: 100.0
    unit: A
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
