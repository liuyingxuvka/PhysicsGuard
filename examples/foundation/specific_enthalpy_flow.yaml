# PhysicsGuard system audit/model blueprint
# Purpose: foundation specific enthalpy flow.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/specific_enthalpy_flow.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_specific_enthalpy_flow
components:
  - id: h
    type: SpecificEnthalpyFlowModule
    parameters:
      cp_J_kgK: 4180.0
      T_ref_K: 300.0
boundaries:
  - variable: h.m_dot_kg_s
    value: 0.1
    unit: kg/s
  - variable: h.T_K
    value: 310.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
