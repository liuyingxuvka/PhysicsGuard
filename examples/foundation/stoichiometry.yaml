# PhysicsGuard system audit/model blueprint
# Purpose: foundation stoichiometry.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/stoichiometry.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_stoichiometry
components:
  - id: stoich
    type: StoichiometryModule
    parameters:
      stoichiometry: 2.0
      feed_initial_guess: 0.2
      consumed_initial_guess: 0.1
boundaries:
  - variable: stoich.n_dot_consumed_mol_s
    value: 0.1
    unit: mol/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
