# PhysicsGuard system audit/model blueprint
# Purpose: foundation thermal conductor.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/foundation/thermal_conductor.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: foundation_thermal_conductor
components:
  - id: cond
    type: ThermalConductorModule
    parameters:
      G_W_K: 50.0
boundaries:
  - variable: cond.T_a_K
    value: 320.0
    unit: K
  - variable: cond.T_b_K
    value: 300.0
    unit: K
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
