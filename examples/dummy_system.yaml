# PhysicsGuard system audit/model blueprint
# Purpose: Dummy framework test system with module, connection, and boundary residuals.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/dummy_system.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: dummy_clean_system
description: Dummy framework test system with module, connection, and boundary residuals.
components:
  - id: a
    type: DummyResidualModule
    parameters:
      target: 5.0
      lower_bound: -100.0
      upper_bound: 100.0
      initial_guess: 0.0
      scale: 1.0
      unit: "1"
  - id: b
    type: DummyResidualModule
    parameters:
      target: 5.0
      lower_bound: -100.0
      upper_bound: 100.0
      initial_guess: 0.0
      scale: 1.0
      unit: "1"
connections:
  - from_variable: a.x
    to_variable: b.x
    description: Dummy equality connection.
boundaries:
  - variable: a.x
    value: 5.0
    unit: "1"
    scale: 1.0
    description: Dummy boundary target.
solver:
  method: least_squares
  max_iterations: 30
  audit_threshold: 1.0
  tolerance: 1.0e-8
  verbose: false
