# PhysicsGuard system audit/model blueprint
# Purpose: control boolean switch.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/boolean_switch.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_boolean_switch
components:
  - id: sw
    type: BooleanSwitchModule
    parameters: {}
boundaries:
  - variable: sw.condition
    value: 1.0
  - variable: sw.true_value
    value: 10.0
  - variable: sw.false_value
    value: -5.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
