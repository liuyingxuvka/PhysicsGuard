# PhysicsGuard system audit/model blueprint
# Purpose: control discrete integrator.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/discrete_integrator.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_discrete_integrator
components:
  - id: integ
    type: DiscreteIntegratorModule
    parameters:
      dt_s: 0.5
      gain: 2.0
boundaries:
  - variable: integ.state_previous
    value: 1.0
  - variable: integ.input
    value: 3.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
