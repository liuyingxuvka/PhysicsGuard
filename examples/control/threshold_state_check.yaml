# PhysicsGuard system audit/model blueprint
# Purpose: control threshold state check.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/threshold_state_check.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_threshold_state_check
components:
  - id: th
    type: ThresholdStateCheckModule
    parameters:
      threshold: 5.0
boundaries:
  - variable: th.input
    value: 6.0
  - variable: th.state
    value: 1.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
