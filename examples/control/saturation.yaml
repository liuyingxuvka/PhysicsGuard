# PhysicsGuard system audit/model blueprint
# Purpose: control saturation.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/saturation.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_saturation
components:
  - id: sat
    type: SaturationModule
    parameters:
      lower: 0.0
      upper: 1.0
boundaries:
  - variable: sat.u
    value: 2.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
