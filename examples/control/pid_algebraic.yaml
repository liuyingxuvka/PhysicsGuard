# PhysicsGuard system audit/model blueprint
# Purpose: control pid algebraic.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/pid_algebraic.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_pid_algebraic
components:
  - id: pid
    type: PIDAlgebraicModule
    parameters:
      Kp: 2.0
      Ki: 0.5
      Kd: 0.1
      bias: 1.0
boundaries:
  - variable: pid.error
    value: 3.0
  - variable: pid.integral_error
    value: 4.0
  - variable: pid.derivative_error
    value: 5.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
