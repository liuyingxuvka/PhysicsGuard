# PhysicsGuard system audit/model blueprint
# Purpose: control hysteresis state check.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/control/hysteresis_state_check.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: control_hysteresis_state_check
components:
  - id: hyst
    type: HysteresisStateCheckModule
    parameters:
      low_threshold: 4.0
      high_threshold: 6.0
boundaries:
  - variable: hyst.input
    value: 7.0
  - variable: hyst.state
    value: 1.0
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
