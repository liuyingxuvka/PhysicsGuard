# PhysicsGuard model-dataset validation plan
# Purpose: calibration validation plan.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli validation run examples/testfile_contracts/pump_loop/validation/calibration_validation_plan.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
validation_id: pump_loop_calibration_validation
audit_file: ../model/pump_loop_hierarchy.yaml
observed_file: ../observed/calibration_train.yaml
contracts:
  - contract: ../contracts/clean_contract.yaml
    required_status: pass
variable_roles:
  - source_id: field:cmd_speed_rad_s
    target: pump_signal_map.x
    validation_role: model_input
    use_policy: preferred
  - source_id: field:flow_readback_kg_s
    target: pump_signal_map.y
    validation_role: validation_output
    use_policy: holdout_only
physical_envelopes:
  - target: pump_signal_map.y
    lower: 0.0
    upper: 300.0
    unit: kg/s
    severity: warning
calibration:
  enabled: true
  method: bounded_least_squares
  train_observed: ../observed/calibration_train.yaml
  holdout_observed: ../observed/calibration_holdout.yaml
  parameters:
    - name: pump_signal_map.a
      lower: 1.0
      upper: 4.0
      initial: 2.0
      scale: 1.0
      unit: dimensionless
      reason: fixture slope is intentionally uncertain for calibration smoke coverage
metadata:
  fixture: calibration
