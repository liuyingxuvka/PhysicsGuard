# PhysicsGuard model-dataset validation plan
# Purpose: clean validation plan.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli validation run examples/testfile_contracts/pump_loop/validation/clean_validation_plan.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
validation_id: pump_loop_clean_validation
evidence_registry: ../evidence/project_evidence_registry.yaml
evidence_bundle_id: pump_loop_validation_bundle_001
audit_file: ../model/pump_loop_hierarchy.yaml
observed_file: ../observed/clean_observed.yaml
contracts:
  - contract: ../contracts/clean_contract.yaml
    required_status: pass
variable_roles:
  - source_id: field:cmd_speed_rad_s
    target: pump_signal_map.x
    validation_role: model_input
    use_policy: preferred
    mapping_confidence: 0.9
    measurement_confidence: 0.8
  - source_id: field:flow_readback_kg_s
    target: pump_signal_map.y
    validation_role: validation_output
    use_policy: holdout_only
    mapping_confidence: 0.9
    measurement_confidence: 0.8
physical_envelopes:
  - target: pump_signal_map.x
    lower: 0.0
    upper: 100.0
    unit: rad/s
    severity: warning
  - target: pump_signal_map.y
    lower: 0.0
    upper: 300.0
    unit: kg/s
    severity: warning
redundant_sensor_checks: []
calibration:
  enabled: false
  method: none
depth:
  model_semantics: pointwise
  dataset:
    dataset_id: pump_loop_clean_dataset
    files:
      - identity_id: clean_csv
        path: ../data/clean.csv
        sha256: a187027e2b4251c607c72405051574034f0ec35b40dec26f8ad8d6b6a0a78a84
        case_ids:
          - baseline_case
          - speed_ramp_case_01
          - speed_ramp_case_02
    field_schema:
      identity_id: clean_manifest_schema
      path: ../data/clean_manifest.yaml
      sha256: 104d08dcfc017eb598d94f27b319b732d388cb8a60cee24a2710b32ad2bf72a6
    parameter_roles:
      identity_id: pump_loop_parameter_roles
      path: ../coverage/pump_loop_role_matrix.yaml
      sha256: fd2671eca165bddac606325ce80d33cdc493c3109afa3d715a9fda838891b53e
    testbench:
      identity_id: pump_loop_testbench_profile
      path: ../profiles/pump_loop_testbench_profile.yaml
      sha256: 01dec6a59b115ef6c09ed4ed847bf5cda4d3bb36590a280cc64dbe88c857663b
    testbench_version: v1
  mapping_review:
    registry:
      identity_id: pump_loop_mapping_registry
      path: ../evidence/project_evidence_registry.yaml
      sha256: d9137b4d331fba0bd313ac399a57e055dbe63b5ef998fa31108e9cd8e6a2b695
    bundle_id: pump_loop_validation_bundle_001
    minimum_confidence: 0.75
    accepted_review_states:
      - ai_registered
      - human_confirmed
  observed_series:
    identity_id: clean_observed_series
    path: ../observed/clean_observed_series.yaml
    sha256: 91609021d5fa584c6be0e4a60f87379fb47b1d6fdfdd1345d7500b529582446a
    case_ids:
      - baseline_case
      - speed_ramp_case_01
      - speed_ramp_case_02
  time_scope:
    claim_scope: scenario_set
    start_time: 0.0
    end_time: 0.2
    time_unit: s
    expected_point_count: 3
  adequacy:
    sampling_mode: full
    threshold_source: pump_loop_fixture_full_manifest_policy_v1
    selection_policy_id: pump_loop_fixture_full_manifest_selection_v1
    selection_rationale: Every row in the bounded three-row fixture is evaluated; no representative subsampling is used.
    minimum_selected_points: 3
    minimum_selected_ratio: 1.0
    minimum_distinct_timestamps: 3
    minimum_time_span: 0.2
    maximum_time_gap: 0.1
    require_start_middle_end: true
    minimum_signal_coverage_ratio: 1.0
    minimum_per_signal_valid_points: 3
    minimum_per_signal_valid_ratio: 1.0
    minimum_per_parameter_valid_points: 3
    minimum_per_parameter_valid_ratio: 1.0
    minimum_parameter_coverage_ratio: 1.0
    maximum_exclusion_ratio: 0.0
    critical_signals:
      - pump_signal_map.x
      - pump_signal_map.y
    critical_parameters:
      - pump_signal_map.a
    parameter_temporal_policies:
      - parameter_id: pump_signal_map.a
        temporal_behavior: static
        classification_source: pump_loop hierarchy plus registered fixture parameter fact
    required_event_tags:
      - baseline
      - speed_ramp
    required_peak_tags:
      - speed_peak
    required_boundary_tags:
      - window_start
      - window_end
    required_mode_ids:
      - valve_open
    family_quotas:
      - family_id: pump_loop_core
        member_kind: mixed
        member_ids:
          - pump_signal_map.x
          - pump_signal_map.y
          - pump_signal_map.a
        minimum_covered_count: 3
        minimum_covered_ratio: 1.0
  scenarios:
    - scenario_id: baseline
      case_ids:
        - baseline_case
      description: Exact baseline point from the clean fixture dataset.
    - scenario_id: speed_ramp
      case_ids:
        - speed_ramp_case_01
        - speed_ramp_case_02
      baseline_scenario_id: baseline
      perturbations:
        - target: pump_signal_map.x
          change: profile
          value:
            start: 10.5
            end: 11.0
          unit: rad/s
          reason: Declared commanded-speed ramp present in the bounded fixture rows.
      description: Two exact rows with a declared commanded-speed perturbation.
  assumptions:
    - The fixture relation y = 2*x is intentionally low fidelity and used only for contract coverage.
    - Each series point is evaluated independently; no dynamics are inferred between timestamps.
metadata:
  fixture: clean
