# PhysicsGuard bounded observed series
# Purpose: positive execution-depth calibration for one genuinely time-varying parameter.
# Boundary: Low-fidelity fixture only; it proves coverage mechanics, not commercial-model equivalence.
series_id: pump_loop_deep_time_varying_parameter_series
time_unit: s
points:
  - point_id: baseline_t0
    timestamp: 0.0
    scenario_id: baseline
    case_id: baseline_case
    source_identity_id: clean_csv
    source_row_index: 0
    event_tags: [baseline]
    boundary_tags: [window_start]
    mode_id: valve_open
    variables:
      pump_signal_map.x: {value: 10.0, unit: rad/s, source: field:cmd_speed_rad_s}
      pump_signal_map.y: {value: 20.0, unit: kg/s, source: field:flow_readback_kg_s}
      pump_signal_map.a: {value: 2.0, unit: '1', source: fact:pump_signal_map.a}
  - point_id: speed_ramp_t1
    timestamp: 0.1
    scenario_id: speed_ramp
    case_id: speed_ramp_case_01
    source_identity_id: clean_csv
    source_row_index: 1
    event_tags: [speed_ramp]
    mode_id: valve_open
    variables:
      pump_signal_map.x: {value: 10.5, unit: rad/s, source: field:cmd_speed_rad_s}
      pump_signal_map.y: {value: 22.05, unit: kg/s, source: fact:time_varying_model_output}
      pump_signal_map.a: {value: 2.1, unit: '1', source: fact:pump_signal_map.a}
  - point_id: speed_ramp_t2
    timestamp: 0.2
    scenario_id: speed_ramp
    case_id: speed_ramp_case_02
    source_identity_id: clean_csv
    source_row_index: 2
    event_tags: [speed_ramp]
    peak_tags: [speed_peak]
    boundary_tags: [window_end]
    mode_id: valve_open
    variables:
      pump_signal_map.x: {value: 11.0, unit: rad/s, source: field:cmd_speed_rad_s}
      pump_signal_map.y: {value: 20.9, unit: kg/s, source: fact:time_varying_model_output}
      pump_signal_map.a: {value: 1.9, unit: '1', source: fact:pump_signal_map.a}
metadata:
  fixture: positive_time_varying_parameter_depth
  source_dataset: pump_loop_clean_dataset
