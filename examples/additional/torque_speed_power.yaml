# PhysicsGuard system audit/model blueprint
# Purpose: additional torque speed power.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/additional/torque_speed_power.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: additional_torque_speed_power
components:
  - id: mech
    type: TorqueSpeedPowerModule
    parameters: {}
boundaries:
  - variable: mech.torque_Nm
    value: 10.0
    unit: N*m
  - variable: mech.omega_rad_s
    value: 100.0
    unit: rad/s
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
