# PhysicsGuard system audit/model blueprint
# Purpose: additional pressure ratio.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/additional/pressure_ratio.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: additional_pressure_ratio
components:
  - id: pr
    type: PressureRatioModule
    parameters: {}
boundaries:
  - variable: pr.p_in_Pa
    value: 100000.0
    unit: Pa
  - variable: pr.p_out_Pa
    value: 200000.0
    unit: Pa
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
