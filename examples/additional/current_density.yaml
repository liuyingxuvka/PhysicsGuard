# PhysicsGuard system audit/model blueprint
# Purpose: additional current density.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/additional/current_density.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: additional_current_density
components:
  - id: cd
    type: CurrentDensityModule
    parameters:
      active_area_m2: 0.1
boundaries:
  - variable: cd.current_A
    value: 100.0
    unit: A
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
