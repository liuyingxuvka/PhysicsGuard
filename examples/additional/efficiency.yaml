# PhysicsGuard system audit/model blueprint
# Purpose: additional efficiency.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/additional/efficiency.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: additional_efficiency
components:
  - id: eff
    type: EfficiencyModule
    parameters: {}
boundaries:
  - variable: eff.input_power_W
    value: 1000.0
    unit: W
  - variable: eff.useful_output_power_W
    value: 800.0
    unit: W
solver:
  tolerance: 1.0e-8
  audit_threshold: 1.0
