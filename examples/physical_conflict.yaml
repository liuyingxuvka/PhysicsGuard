# PhysicsGuard system audit/model blueprint
# Purpose: Deliberately conflicting low-fidelity physical audit example.
# Repository: https://github.com/liuyingxuvka/PhysicsGuard
# Use with: python -m physicsguard.cli run examples/physical_conflict.yaml --pretty
# Boundary: Low-fidelity SI-unit residual audit or blueprint only; not a high-fidelity solver, commercial-tool adapter, or reverse-engineered model.
system_name: physical_conflict
description: Deliberately conflicting low-fidelity physical audit example.
components:
  - id: coolant
    type: CoolantHeatBalanceModule
    parameters:
      cp_J_kgK: 4180.0
      residual_scale_W: 1000.0
      Q_dot_initial_guess: 0.0
boundaries:
  - variable: coolant.m_dot_kg_s
    value: 0.1
    unit: kg/s
    scale: 0.001
  - variable: coolant.T_in_K
    value: 300.0
    unit: K
    scale: 0.01
  - variable: coolant.T_out_K
    value: 310.0
    unit: K
    scale: 0.01
  - variable: coolant.Q_dot_W
    value: 0.0
    unit: W
    scale: 1.0
solver:
  method: least_squares
  max_iterations: 30
  audit_threshold: 1.0
